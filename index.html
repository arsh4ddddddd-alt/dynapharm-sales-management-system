<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dynapharm Kinshasa Reset Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root { --p: #0f172a; --accent: #6366f1; --orange: #f97316; --bg: #f8fafc; --warn: #f43f5e; }
        body { font-family: 'Inter', sans-serif; margin: 0; padding-bottom: 150px; background: var(--bg); color: #1e293b; }
        .hidden { display: none !important; }

        /* --- UI COMPONENTS --- */
        .header { background: var(--p); color: white; padding: 30px 20px 50px; border-radius: 0 0 35px 35px; }
        .stats-row { display: flex; gap: 12px; margin-top: 25px; margin-bottom: -70px; position: relative; z-index: 5; }
        .stat-box { flex: 1; background: #1e293b; padding: 20px 15px; border-radius: 22px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.05); text-align: center; }
        .stat-box small { font-size: 10px; color: #94a3b8; font-weight: bold; display: block; text-transform: uppercase; }
        .stat-box b { font-size: 18px; color: white; display: block; margin-top: 5px; }

        .content { padding: 90px 20px 20px; }
        .card { background: white; padding: 18px; border-radius: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 12px; border: 1px solid #f1f5f9; display: flex; justify-content: space-between; align-items: center; }
        
        .btn { width: 100%; padding: 16px; border: none; border-radius: 16px; font-weight: 700; cursor: pointer; transition: 0.2s; font-size: 15px; }
        .btn-p { background: var(--accent); color: white; }
        .btn-orange { background: var(--orange); color: white; margin-bottom: 20px; }
        .btn-danger { background: #fee2e2; color: var(--warn); border: 1px solid #fecaca; margin-top: 20px; }

        .nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; background: #0f172a; display: flex; border-radius: 25px; padding: 12px; box-shadow: 0 20px 30px rgba(0,0,0,0.3); z-index: 1000; }
        .nav-btn { flex: 1; text-align: center; color: #64748b; font-size: 10px; font-weight: bold; cursor: pointer; }
        .nav-btn.active { color: white; }
        .nav-btn span { font-size: 24px; display: block; margin-bottom: 4px; }

        input[type="number"] { width: 75px; padding: 10px; border: 1px solid #e2e8f0; border-radius: 10px; text-align: center; font-weight: bold; outline: none; }
    </style>
</head>
<body>

<div id="v-auth" style="background:#0f172a; height:100vh; display:flex; align-items:center; justify-content:center; padding:20px;">
    <div style="text-align:center; color:white; width:100%; max-width:320px;">
        <h1 style="letter-spacing:4px;">BOTOUR</h1>
        <p style="color:#64748b;">Kinshasa Depot</p>
        <input id="user" placeholder="Username" style="width:100%; padding:15px; margin-bottom:15px; border-radius:12px; border:none; background:#1e293b; color:white;">
        <input id="pass" type="password" placeholder="Password" style="width:100%; padding:15px; margin-bottom:20px; border-radius:12px; border:none; background:#1e293b; color:white;">
        <button class="btn btn-p" onclick="handleAuth()">Sign In</button>
    </div>
</div>

<div id="main-ui" class="hidden">
    <div class="header">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <div><small>STATION: KINSHASA</small><b id="u-display" style="font-size:20px;">ARSHAD</b></div>
            <select id="m-picker" onchange="refresh()" style="background:rgba(255,255,255,0.1); color:white; border:none; padding:8px; border-radius:10px;">
                <option style="color:black">March 2026</option><option style="color:black">April 2026</option>
            </select>
        </div>
        <div class="stats-row">
            <div class="stat-box"><small>MONTHLY ITEMS</small><b id="s-total">0</b></div>
            <div class="stat-box"><small>SYSTEM</small><b style="color:#10b981; font-size:14px;">READY</b></div>
        </div>
    </div>

    <div class="content">
        <div id="v-entry">
            <div class="card" style="margin-bottom:20px;"><input id="search" placeholder="🔍 Search Product..." oninput="draw(this.value)" style="border:none; width:100%; outline:none;"></div>
            <div id="list"></div>
            <button class="btn btn-p" onclick="saveData()">💾 Save Entry</button>
        </div>

        <div id="v-rpt" class="hidden">
            <button class="btn btn-orange" onclick="exportPDF()">📄 Download PDF Report</button>
            <div id="rpt-list"></div>
            
            <div style="margin-top:40px; border-top:2px dashed #e2e8f0; padding-top:20px; text-align:center;">
                <b style="color:var(--warn); font-size:12px;">DANGER ZONE</b>
                <button class="btn btn-danger" onclick="resetEverything()">🗑️ Delete All & Start New</button>
                <p style="font-size:11px; color:#94a3b8; margin-top:10px;">This wipes out Malaysia Stock and Sales for the selected month.</p>
            </div>
        </div>
    </div>

    <div class="nav">
        <div class="nav-btn active" onclick="tab('RECEIVED', this)"><span>🇲🇾</span>MALAYSIA</div>
        <div class="nav-btn" onclick="tab('SALES', this)"><span>📉</span>DAILY SALE</div>
        <div class="nav-btn" onclick="tab('REPORT', this)"><span>📊</span>REPORT</div>
    </div>
</div>

<script>
    const _URL = "https://ywmlvtdrwijnhqdypteu.supabase.co";
    const _KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl3bWx2dGRyd2lqbmhxZHlwdGV1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI5MDM2NjIsImV4cCI6MjA4ODQ3OTY2Mn0.8-CE8qchVD8NcBX-_FDgegsjTxNMwd9IN7oNe5qeTpg";
    const sb = supabase.createClient(_URL, _KEY);
    let curMode = "RECEIVED";
    const items = [{c:"DRC1201", n:"GINKO & GINSENG COFFEE"}, {c:"DRC1202", n:"GANODERMA GREEN TEA"}, {c:"DRC1203", n:"KACIP FATIMA GANO"}, {c:"DRC1204", n:"TONGKAT & MACCA"}, {c:"DRC1814", n:"GANO CHOCO"}, {c:"DRC1818", n:"BLACK GANO"}, {c:"DRC2802", n:"GOAT MILK 150s"}, {c:"DRC3804", n:"DYNA TONIC"}, {c:"DRC5801", n:"CHLOROPHYLL SOAP"}, {c:"DRC5802", n:"GANO SOAP"}];

    async function handleAuth() {
        const u = document.getElementById("user").value.trim(), p = document.getElementById("pass").value;
        const { error } = await sb.auth.signInWithPassword({email: u.toLowerCase()+"@dyna.pro", password:p});
        if(error) alert("Access Denied"); else { document.getElementById("u-display").innerText = u.toUpperCase(); document.getElementById("v-auth").classList.add("hidden"); document.getElementById("main-ui").classList.remove("hidden"); refresh(); }
    }
    function tab(m, el) { curMode = m; document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active")); el.classList.add("active"); document.getElementById("v-entry").classList.toggle("hidden", m === 'REPORT'); document.getElementById("v-rpt").classList.toggle("hidden", m !== 'REPORT'); if(m === 'REPORT') loadReport(); else draw(); }
    function refresh() { draw(); loadReport(); }
    function draw(f = "") { document.getElementById("list").innerHTML = items.filter(i => i.n.includes(f.toUpperCase())).map(i => `<div class="card"><div><b>${i.n}</b><br><small style="color:#64748b">${i.c}</small></div><input type="number" class="qty-in" data-c="${i.c}" placeholder="0"></div>`).join(""); }
    
    async function saveData() {
        const { data: { user } } = await sb.auth.getUser(); const month = document.getElementById("m-picker").value;
        const rows = [...document.querySelectorAll(".qty-in")].map(x => ({ code: x.dataset.c, qty: parseInt(x.value) || 0 })).filter(x => x.qty > 0);
        if(!rows.length) return alert("Enter quantities!");
        let res;
        if(curMode === "SALES") res = await sb.from("sales").insert(rows.map(r => ({ product_code: r.code, qty_sold: r.qty, month_ref: month, user_id: user.id })));
        else if(curMode === "RECEIVED") res = await sb.from("received_stock").insert(rows.map(r => ({ product_code: r.code, qty_received: r.qty, month_ref: month, user_id: user.id })));
        if(res.error) alert("Error saving"); else { alert("Saved!"); draw(); }
    }

    async function resetEverything() {
        const month = document.getElementById("m-picker").value;
        const check = confirm(`⚠️ DANGER: Delete all Malaysia Stock and Sales for ${month}?`);
        if(!check) return;
        
        const { data: { user } } = await sb.auth.getUser();
        await Promise.all([
            sb.from("received_stock").delete().eq('month_ref', month).eq('user_id', user.id),
            sb.from("sales").delete().eq('month_ref', month).eq('user_id', user.id)
        ]);
        alert("System Cleared!");
        refresh();
    }

    async function loadReport() {
        const month = document.getElementById("m-picker").value;
        const [{data:s}, {data:r}] = await Promise.all([sb.from("sales").select("*").eq('month_ref', month), sb.from("received_stock").select("*").eq('month_ref', month)]);
        const report = items.map(i => {
            const sold = s?.filter(x => x.product_code === i.c).reduce((a,b)=>a+b.qty_sold, 0) || 0;
            const recv = r?.filter(x => x.product_code === i.c).reduce((a,b)=>a+b.qty_received, 0) || 0;
            return { name: i.n, recv, sold, stock: (recv - sold) };
        }).filter(x => x.recv > 0 || x.sold > 0);
        document.getElementById("s-total").innerText = report.length;
        document.getElementById("rpt-list").innerHTML = report.map(d => `<div class="card"><div style="flex:1"><b>${d.name}</b><br><small style="color:#64748b">MALAYSIA: ${d.recv} | SOLD: ${d.sold}</small></div><div style="text-align:right"><b style="color:${d.stock < 10 ? '#f43f5e' : '#10b981'}; font-size:18px;">${d.stock}</b><br><small>LEFT</small></div></div>`).join("");
        window.rptData = report;
    }

    function exportPDF() {
        const { jsPDF } = window.jspdf; const doc = new jsPDF();
        doc.setFillColor(15, 23, 42); doc.rect(0, 0, 210, 40, 'F');
        doc.setTextColor(255, 255, 255); doc.setFontSize(22); doc.text("DYNAPHARM DEPOT REPORT", 14, 25);
        doc.autoTable({ startY: 45, head: [['PRODUCT', 'MALAYSIA STOCK', 'SOLD', 'REMAINING']], body: window.rptData.map(x => [x.name, x.recv, x.sold, x.stock]), headStyles: { fillColor: [249, 115, 22] } });
        doc.save(`Stock_Report.pdf`);
    }
</script>
</body>
</html>
