<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Depot Manual Ledger & Inventory</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 20px; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        h1 { color: #1e3a8a; text-align: center; }
        .input-section { background: #f8fafc; padding: 20px; border-radius: 8px; border: 1px solid #e2e8f0; margin-bottom: 20px; }
        .grid-inputs { display: grid; grid-template-columns: 1fr 2fr 1fr 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        input, select { padding: 10px; border: 1px solid #cbd5e1; border-radius: 4px; font-size: 14px; }
        .btn-add { background: #3b82f6; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%; }
        .btn-add:hover { background: #2563eb; }
        .summary-boxes { display: flex; gap: 20px; margin: 20px 0; }
        .box { flex: 1; padding: 15px; border-radius: 8px; text-align: center; color: white; font-weight: bold; }
        .box-blue { background: #1e3a8a; }
        .box-red { background: #dc2626; }
        .box-green { background: #16a34a; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #e2e8f0; padding: 12px; text-align: left; }
        th { background: #f1f5f9; color: #1e3a8a; }
        .btn-download { background: #059669; color: white; border: none; padding: 15px; width: 100%; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h1>📦 Depot Master Ledger</h1>
    
    <div class="input-section">
        <h3 style="margin-top:0">1. Enter Book Entry (Stock Movement)</h3>
        <div class="grid-inputs">
            <input type="date" id="moveDate">
            <input type="text" id="shopName" placeholder="Shop Name (e.g. UPN)">
            <input type="text" id="prodCode" placeholder="Code (DRC1201)">
            <input type="text" id="prodName" placeholder="Product Name">
            <input type="number" id="qtySent" placeholder="Qty Sent">
        </div>
        <div class="grid-inputs">
            <input type="number" id="price" placeholder="Price ($)">
            <input type="number" id="openingStock" placeholder="Opening Stock in Depot">
            <button class="btn-add" onclick="addRow()">ADD TO REPORT</button>
        </div>
    </div>

    <div class="summary-boxes">
        <div class="box box-blue">Total Opening Stock<br><span id="sumIn">0</span></div>
        <div class="box box-red">Total Stock Out<br><span id="sumOut">0</span></div>
        <div class="box box-green">Remaining in Depot<br><span id="sumBal">0</span></div>
    </div>

    <table id="ledgerTable">
        <thead>
            <tr>
                <th>Date</th>
                <th>Shop</th>
                <th>Code</th>
                <th>Product</th>
                <th>Opening</th>
                <th>Sent Out</th>
                <th>Balance</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <button class="btn-download" onclick="generatePDF()">DOWNLOAD FULL AUDIT REPORT</button>
</div>

<script>
    let ledger = [];

    function addRow() {
        const date = document.getElementById('moveDate').value;
        const shop = document.getElementById('shopName').value;
        const code = document.getElementById('prodCode').value;
        const name = document.getElementById('prodName').value;
        const qty = parseInt(document.getElementById('qtySent').value) || 0;
        const opening = parseInt(document.getElementById('openingStock').value) || 0;
        
        if(!date || !shop || !name) { alert("Please fill at least Date, Shop, and Product"); return; }

        const balance = opening - qty;
        
        ledger.push({ date, shop, code, name, opening, qty, balance });
        updateUI();
        
        // Clear inputs for next item
        document.getElementById('prodCode').value = "";
        document.getElementById('prodName').value = "";
        document.getElementById('qtySent').value = "";
    }

    function updateUI() {
        const tbody = document.querySelector('#ledgerTable tbody');
        tbody.innerHTML = "";
        
        let totalIn = 0;
        let totalOut = 0;

        ledger.forEach(item => {
            totalIn += item.opening;
            totalOut += item.qty;
            
            const row = `<tr>
                <td>${item.date}</td>
                <td>${item.shop}</td>
                <td>${item.code}</td>
                <td>${item.name}</td>
                <td>${item.opening}</td>
                <td style="color:red; font-weight:bold;">-${item.qty}</td>
                <td style="font-weight:bold;">${item.balance}</td>
            </tr>`;
            tbody.innerHTML += row;
        });

        document.getElementById('sumIn').innerText = totalIn;
        document.getElementById('sumOut').innerText = totalOut;
        document.getElementById('sumBal').innerText = (totalIn - totalOut);
    }

    function generatePDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('l', 'mm', 'a4');
        
        doc.setFontSize(18);
        doc.text("DEPOT INVENTORY & DISTRIBUTION AUDIT", 14, 15);

        const data = ledger.map(i => [i.date, i.shop, i.code, i.name, i.opening, i.qty, i.balance]);

        doc.autoTable({
            startY: 25,
            head: [['Date', 'Destination', 'Code', 'Product', 'Opening Stock', 'Qty Sent', 'Final Balance']],
            body: data,
            theme: 'grid',
            headStyles: { fillColor: [30, 58, 138] }
        });

        doc.save("Depot_Manual_Audit.pdf");
    }
</script>

</body>
</html>
