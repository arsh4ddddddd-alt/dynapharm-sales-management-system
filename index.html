<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dynapharm ERP | Private v15.0</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root { --p: #003366; --s: #059669; --bg: #f1f5f9; --w: #ffffff; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; }
        .app { width: 100%; max-width: 500px; background: var(--w); min-height: 100vh; display: flex; flex-direction: column; }
        .hidden { display: none !important; }
        .header { background: var(--p); color: white; padding: 30px 20px; text-align: center; border-radius: 0 0 20px 20px; }
        .content { padding: 20px; flex-grow: 1; }
        input { width: 100%; padding: 15px; border-radius: 10px; border: 2px solid #ddd; font-size: 16px; box-sizing: border-box; margin-bottom: 10px; }
        .btn { width: 100%; padding: 16px; border-radius: 12px; border: none; font-size: 14px; font-weight: 800; cursor: pointer; text-transform: uppercase; margin-bottom: 10px; }
        .btn-p { background: var(--p); color: white; }
        .btn-s { background: var(--s); color: white; }
        .btn-o { background: transparent; border: 2px solid var(--p); color: var(--p); }
        .card { background: #f8fafc; padding: 15px; border-radius: 12px; margin-bottom: 10px; border-left: 5px solid var(--p); display: flex; justify-content: space-between; align-items: center; }
        .qty-badge { background: var(--s); color: white; padding: 6px 14px; border-radius: 20px; font-weight: 900; }
        #console { background: #000; color: #0f0; padding: 10px; font-family: monospace; font-size: 11px; }
    </style>
</head>
<body>
<div class="app">
    <div id="v-auth">
        <div class="header"><h1>DYNAPHARM</h1><p>PRIVATE ACCOUNT LOGIN</p></div>
        <div class="content">
            <input type="text" id="user" placeholder="Username">
            <input type="password" id="pass" placeholder="Password (6+ chars)">
            <button class="btn btn-p" onclick="handleAuth()">Sign In</button>
            <button class="btn btn-o" onclick="toggleAuth()">New Registration</button>
        </div>
    </div>

    <div id="v-dash" class="hidden">
        <div class="header"><h2>COMMAND CENTER</h2><p id="u-tag"></p></div>
        <div class="content">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <button class="btn btn-s" style="height:120px;" onclick="showV('v-stock')">📦 ADD<br>STOCK</button>
                <button class="btn btn-p" style="height:120px;" onclick="loadReport()">📊 VIEW<br>REPORTS</button>
            </div>
            <button class="btn btn-o" style="margin-top: 50px; color:red; border-color:red;" onclick="location.reload()">Logout</button>
        </div>
    </div>

    <div id="v-stock" class="hidden">
        <div class="content">
            <h3>Inventory Entry</h3>
            <input type="text" placeholder="🔍 Search product..." oninput="draw(this.value)">
            <div id="list" style="max-height: 400px; overflow-y: auto; margin-bottom: 15px;"></div>
            <button class="btn btn-s" id="b-save" onclick="save()">✅ SYNC TO MY CLOUD</button>
            <button class="btn btn-o" onclick="showV('v-dash')">Back</button>
        </div>
    </div>

    <div id="v-rpt" class="hidden">
        <div class="content">
            <h3>My Private Report</h3>
            <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                <button class="btn btn-p" style="background:#dc2626; flex:1;" onclick="exportPDF()">📄 EXPORT PDF</button>
                <button class="btn btn-o" style="flex:1;" onclick="loadReport()">🔄 REFRESH</button>
            </div>
            <div id="rpt-list" style="max-height: 450px; overflow-y: auto;"></div>
            <button class="btn btn-o" onclick="showV('v-dash')">Back</button>
        </div>
    </div>
    <div id="console">> System Ready</div>
</div>

<script>
    const _URL = "https://ywmlvtdrwijnhqdypteu.supabase.co";
    const _KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl3bWx2dGRyd2lqbmhxZHlwdGV1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI5MDM2NjIsImV4cCI6MjA4ODQ3OTY2Mn0.8-CE8qchVD8NcBX-_FDgegsjTxNMwd9IN7oNe5qeTpg";
    const sb = supabase.createClient(_URL, _KEY);

    let isL = true;
    let reportData = [];
    const log = (m) => { document.getElementById('console').innerText = "> " + m; };

    const items = [
        {c:"DRC1201", n:"GINKO & GINSENG COFFEE"}, {c:"DRC1202", n:"GANODERMA GREEN TEA"}, {c:"DRC1203", n:"KACIP FATIMA GANO"}, 
        {c:"DRC1204", n:"TONGKAT & MACCA"}, {c:"DRC1205", n:"CAPPUCCINO GANO"}, {c:"DRC1802A", n:"LIQUID ALFALFA 500ML"},
        {c:"DRC1804", n:"GANODERMA COFFEE"}, {c:"DRC1810", n:"YEE GANO 90s"}, {c:"DRC1811", n:"YEEGARLIC 90s"}, 
        {c:"DRC1814", n:"GANO CHOCO"}, {c:"DRC1817", n:"PRESIDENT COFFEE"}, {c:"DRC1818", n:"BLACK GANO"},
        {c:"DRC2802", n:"GOAT MILK 150s"}, {c:"DRC2804", n:"SOYA POWDER"}, {c:"DRC2805", n:"SPIRULINA 60s"}, 
        {c:"DRC2807", n:"SPIRULINA 300s"}, {c:"DRC2812", n:"WARISAN MAHARANI"}, {c:"DRC2813", n:"GINGER SOYA"},
        {c:"DRC2814", n:"PREMIX GOAT MILK"}, {c:"DRC3804", n:"DYNA TONIC 200ML"}, {c:"DRC3804A", n:"DYNA TONIC 500ML"},
        {c:"DRC3809", n:"YEE YANG YEN"}, {c:"DRC3810", n:"RED COFFEE GINSENG"}, {c:"DRC3812", n:"GREEN TEA 60s"}, 
        {c:"DRC3814", n:"PROLINK 20s"}, {c:"DRC4803", n:"GINSENG HONEY"}, {c:"DRC4805", n:"GINSENG 9x10"}, 
        {c:"DRC4810", n:"TONGKAT ALI COFFEE"}, {c:"DRC4811", n:"GINALI 100s"}, {c:"DRC4815", n:"YEEGINKGO 90s"}, 
        {c:"DRC4817", n:"MILK THISTLE"}, {c:"DRC4821", n:"TONGKAT ALI 100s"}, {c:"DRC4824", n:"SEA CUCUMBER 250ML"},
        {c:"DRC4824A", n:"SEA CUCUMBER 500ML"}, {c:"DRC5801", n:"CHLOROPHYLL SOAP"}, {c:"DRC5802", n:"GANO SOAP"}
    ];

    async function handleAuth() {
        const u = document.getElementById('user').value.trim();
        const p = document.getElementById('pass').value;
        if(!u || p.length < 6) return alert("Error: Use 6+ chars for password.");
        log("Logging in...");
        const email = u.toLowerCase() + "@dyna.pro";
        const { data, error } = isL ? await sb.auth.signInWithPassword({ email, password: p }) 
                             : await sb.auth.signUp({ email, password: p });
        if(error) alert(error.message);
        else { document.getElementById('u-tag').innerText = "Account: " + u.toUpperCase(); showV('v-dash'); }
    }

    function showV(id) {
        document.querySelectorAll('.app > div').forEach(d => { if(d.id !== 'console') d.classList.add('hidden'); });
        document.getElementById(id).classList.remove('hidden');
        if(id === 'v-stock') draw();
    }

    function draw(f = "") {
        document.getElementById('list').innerHTML = items.filter(i => i.n.includes(f.toUpperCase()) || i.c.includes(f.toUpperCase())).map(i => `
            <div class="card">
                <div><b>${i.n}</b><br><small>${i.c}</small></div>
                <input type="number" class="qty-in" data-c="${i.c}" style="width:70px; margin:0;" placeholder="0">
            </div>`).join('');
    }

    async function save() {
        // Step 2 Logic: This finds exactly who is logged in right now
        const { data: { user } } = await sb.auth.getUser();
        if(!user) return alert("Please log in again.");

        const data = Array.from(document.querySelectorAll('.qty-in')).map(i => ({
            month_year: "March 2026", 
            product_code: i.dataset.c, 
            opening_quantity: parseInt(i.value) || 0,
            user_id: user.id // <-- This saves the record ONLY to your account
        })).filter(x => x.opening_quantity > 0);

        if(data.length === 0) return alert("Enter quantities!");
        log("Uploading to your account...");
        
        // Conflict logic updated to include user_id
        const { error } = await sb.from('monthly_stock').upsert(data, { onConflict: 'month_year,product_code,user_id' });
        
        if(error) { alert("Save Error: " + error.message); } 
        else { alert("✅ SUCCESS: Saved to your account!"); showV('v-dash'); }
    }

    async function loadReport() {
        showV('v-rpt');
        const rList = document.getElementById('rpt-list');
        rList.innerHTML = "<p>Loading your data...</p>";
        
        // This query automatically only sees YOUR data because of the SQL policy
        const { data, error } = await sb.from('monthly_stock').select('*').eq('month_year', 'March 2026');
        
        if(error) { alert(error.message); }
        else {
            reportData = data;
            rList.innerHTML = data.length === 0 ? "<p>No private data found.</p>" : data.map(d => {
                const item = items.find(i => i.c === d.product_code);
                return `<div class="card" style="border-left-color: var(--s);">
                    <div><b>${item ? item.n : d.product_code}</b><br><small>${d.product_code}</small></div>
                    <div class="qty-badge">${d.opening_quantity}</div>
                </div>`;
            }).join('');
        }
    }

    function exportPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.text("DYNAPHARM PRIVATE REPORT - MARCH 2026", 14, 20);
        const rows = reportData.map(d => [d.product_code, d.opening_quantity]);
        doc.autoTable({ head: [['Code', 'Qty']], body: rows, startY: 30 });
        doc.save("MyReport.pdf");
    }

    function toggleAuth() { isL = !isL; alert(isL ? "Login Mode" : "Register Mode"); }
</script>
</body>
</html>
