<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InstaCheck iOS</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f0f2f5; padding: 15px; }
        .card { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        h2 { text-align: center; color: #d62976; }
        .step { margin-bottom: 20px; border-bottom: 1px solid #eee; pb: 10px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 14px; }
        input[type="file"] { width: 100%; margin-bottom: 10px; }
        button { width: 100%; padding: 15px; background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); color: white; border: none; border-radius: 10px; font-weight: bold; font-size: 16px; cursor: pointer; }
        #results { margin-top: 20px; display: none; }
        .user-link { display: block; padding: 10px; background: #f8f8f8; margin-bottom: 5px; border-radius: 5px; text-decoration: none; color: #0095f6; font-weight: 500; }
    </style>
</head>
<body>

<div class="card">
    <h2>Unfollower Finder</h2>
    
    <div class="step">
        <label>1. Upload 'following.json'</label>
        <input type="file" id="followingFile" accept=".json">
    </div>

    <div class="step">
        <label>2. Upload 'followers.json'</label>
        <input type="file" id="followersFile" accept=".json">
    </div>

    <button onclick="analyzeData()">Analyze My Friends</button>

    <div id="results">
        <h3 id="countText"></h3>
        <div id="list"></div>
    </div>
</div>

<script>
    async function analyzeData() {
        const followingFile = document.getElementById('followingFile').files[0];
        const followersFile = document.getElementById('followersFile').files[0];

        if (!followingFile || !followersFile) {
            alert("Please upload both JSON files first!");
            return;
        }

        const followingData = JSON.parse(await followingFile.text());
        const followersData = JSON.parse(await followersFile.text());

        // Extract usernames based on Instagram's JSON structure
        const following = new Set(followingData.relationships_following.map(i => i.string_list_data[0].value));
        const followers = new Set(followersData.map(i => i.string_list_data[0].value));

        const listDiv = document.getElementById('list');
        listDiv.innerHTML = '';
        let count = 0;

        following.forEach(user => {
            if (!followers.has(user)) {
                const a = document.createElement('a');
                a.className = 'user-link';
                a.href = `https://instagram.com/${user}`;
                a.target = "_blank";
                a.textContent = `@${user}`;
                listDiv.appendChild(a);
                count++;
            }
        });

        document.getElementById('countText').textContent = `${count} people don't follow you back:`;
        document.getElementById('results').style.display = 'block';
    }
</script>

</body>
</html>
