<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dynapharm Elite v29</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root {
            --p: #0f172a;
            --accent: #6366f1;
            --success: #10b981;
            --warn: #f43f5e;
            --orange: #f97316;
            --bg: #f8fafc;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0;
            background: var(--bg);
            padding-bottom: 120px;
            color: #1e293b;
        }

        .hidden { display: none !important; }

        /* --- STUNNING LOGIN --- */
        #v-auth {
            background: radial-gradient(circle at top left, #1e293b, #0f172a);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .auth-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%;
            max-width: 350px;
            text-align: center;
        }

        .auth-card h1 { color: white; margin: 0; letter-spacing: 2px; }
        .auth-card p { color: #94a3b8; font-size: 14px; margin-bottom: 25px; }

        .auth-input {
            width: 100%;
            padding: 14px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            color: white;
            margin-bottom: 15px;
            box-sizing: border-box;
        }

        /* --- DASHBOARD HEADER FIX --- */
        .header {
            background: var(--p);
            color: white;
            padding: 30px 20px 40px; /* Increased bottom padding */
            border-radius: 0 0 35px 35px;
            position: relative;
        }

        .stats-row {
            display: flex;
            gap: 12px;
            margin-top: 25px;
            margin-bottom: -60px; /* Pulls the content up slightly but safely */
            position: relative;
            z-index: 5;
        }

        .stat-box {
            flex: 1;
            background: #1e293b; /* Solid dark color to prevent overlap mess */
            padding: 18px 15px;
            border-radius: 22px;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.05);
        }

        .stat-box small { font-size: 10px; color: #94a3b8; display: block; font-weight: bold; }
        .stat-box b { font-size: 18px; display: block; margin-top: 5px; color: white; }

        /* --- CONTENT SPACING --- */
        .content { 
            padding: 80px 20px 20px; /* Added 80px top padding to clear the stat boxes */
        }

        .card {
            background: white;
            padding: 18px;
            border-radius: 20px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            margin-bottom: 15px;
            border: 1px solid #f1f5f9;
        }

        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 16px;
            font-weight: 700;
            cursor: pointer;
            font-size: 15px;
            transition: 0.2s;
        }

        .btn-p { background: var(--accent); color: white; }
        .btn-orange { background: var(--orange); color: white; margin-bottom: 15px; }

        /* --- NAVIGATION --- */
        .nav {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 420px;
            background: #0f172a;
            display: flex;
            border-radius: 25px;
            padding: 12px;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.3);
            z-index: 1000;
        }

        .nav-btn { flex: 1; text-align: center; color: #64748b; font-size: 10px; font-weight: bold; }
        .nav-btn.active { color: white; }
        .nav-btn span { font-size: 22px; display: block; margin-bottom: 4px; }
    </style>
</head>
<body>

<div id="v-auth">
    <div class="auth-card">
        <h1>DYNAPHARM</h1>
        <p>Elite Inventory Access</p>
        <input id="user" class="auth-input" placeholder="Username">
        <input id="pass" type="password" class="auth-input" placeholder="Password">
        <button class="btn btn-p" onclick="handleAuth()">Sign In</button>
        <div onclick="toggleAuth()" id="t-btn" style="margin-top:20px; color:#94a3b8; cursor:pointer; font-size:12px;">
            Need an account? <b>Register</b>
        </div>
    </div>
</div>

<div id="main-ui" class="hidden">
    <div class="header">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <div>
                <small style="opacity:0.7">WELCOME,</small><br>
                <b id="u-display" style="font-size: 18px; letter-spacing: 1px;">USER</b>
            </div>
            <select id="m-picker" onchange="refresh()" style="background:rgba(255,255,255,0.15); color:white; border:none; padding:8px; border-radius:10px; font-weight:bold;">
                <option style="color:black">March 2026</option>
                <option style="color:black">April 2026</option>
            </select>
        </div>

        <div class="stats-row">
            <div class="stat-box">
                <small>ACTIVE ITEMS</small>
                <b id="s-total">0</b>
            </div>
            <div class="stat-box">
                <small>TOP PRODUCT</small>
                <b id="s-top" style="font-size:13px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">---</b>
            </div>
        </div>
    </div>

    <div class="content">
        <div id="v-entry">
            <div class="card" style="padding: 12px;">
                <input id="search" placeholder="🔍 Search products..." oninput="draw(this.value)" style="border:none; width:100%; outline:none;">
            </div>
            <div id="list"></div>
            <button class="btn btn-p" onclick="saveData()" style="margin-top:10px;">💾 Sync Cloud Data</button>
        </div>

        <div id="v-rpt" class="hidden">
            <button class="btn btn-orange" onclick="exportPDF()">📄 Download PDF Report</button>
            <div id="rpt-list"></div>
        </div>
    </div>

    <div class="nav">
        <div class="nav-btn active" onclick="tab('OPENING', this)"><span>📦</span>OPEN</div>
        <div class="nav-btn" onclick="tab('RECEIVED', this)"><span>🚚</span>RECV</div>
        <div class="nav-btn" onclick="tab('SALES', this)"><span>💰</span>SALE</div>
        <div class="nav-btn" onclick="tab('REPORT', this)"><span>📊</span>RPT</div>
    </div>
</div>

<script>
    const _URL = "https://ywmlvtdrwijnhqdypteu.supabase.co";
    const _KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl3bWx2dGRyd2lqbmhxZHlwdGV1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI5MDM2NjIsImV4cCI6MjA4ODQ3OTY2Mn0.8-CE8qchVD8NcBX-_FDgegsjTxNMwd9IN7oNe5qeTpg";
    const sb = supabase.createClient(_URL, _KEY);

    let isLogin = true;
    let curMode = "OPENING";
    const items = [
        {c:"DRC1201", n:"GINKO & GINSENG COFFEE"}, {c:"DRC1202", n:"GANODERMA GREEN TEA"}, 
        {c:"DRC1203", n:"KACIP FATIMA GANO"}, {c:"DRC1204", n:"TONGKAT & MACCA"}, 
        {c:"DRC1814", n:"GANO CHOCO"}, {c:"DRC1818", n:"BLACK GANO"}, 
        {c:"DRC2802", n:"GOAT MILK 150s"}, {c:"DRC3804", n:"DYNA TONIC"}, 
        {c:"DRC5801", n:"CHLOROPHYLL SOAP"}, {c:"DRC5802", n:"GANO SOAP"}
    ];

    function toggleAuth() {
        isLogin = !isLogin;
        document.getElementById("t-btn").innerHTML = isLogin ? "Need an account? <b>Register</b>" : "Have account? <b>Login</b>";
    }

    async function handleAuth() {
        const u = document.getElementById("user").value.trim();
        const p = document.getElementById("pass").value;
        const email = u.toLowerCase() + "@dyna.pro";
        const { error } = isLogin ? await sb.auth.signInWithPassword({email, password:p}) : await sb.auth.signUp({email, password:p});
        if(error) alert(error.message);
        else {
            document.getElementById("u-display").innerText = u.toUpperCase();
            document.getElementById("v-auth").classList.add("hidden");
            document.getElementById("main-ui").classList.remove("hidden");
            refresh();
        }
    }

    function tab(m, el) {
        curMode = m;
        document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"));
        el.classList.add("active");
        document.getElementById("v-entry").classList.toggle("hidden", m === "REPORT");
        document.getElementById("v-rpt").classList.toggle("hidden", m !== "REPORT");
        if(m === "REPORT") loadReport(); else draw();
    }

    function refresh() { draw(); loadReport(); }

    function draw(f = "") {
        document.getElementById("list").innerHTML = items
            .filter(i => i.n.includes(f.toUpperCase()) || i.c.includes(f.toUpperCase()))
            .map(i => `
                <div class="card" style="display:flex; justify-content:space-between; align-items:center;">
                    <div><b style="font-size:13px">${i.n}</b><br><small style="color:#64748b">${i.c}</small></div>
                    <input type="number" class="qty-in" data-c="${i.c}" placeholder="0" style="width:70px; text-align:center; padding:10px; border:1px solid #e2e8f0; border-radius:10px;">
                </div>
            `).join("");
    }

    async function saveData() {
        const { data: { user } } = await sb.auth.getUser();
        const month = document.getElementById("m-picker").value;
        const rows = [...document.querySelectorAll(".qty-in")]
            .map(x => ({ code: x.dataset.c, qty: parseInt(x.value) || 0 }))
            .filter(x => x.qty > 0);

        if(!rows.length) return alert("Please enter some numbers!");

        let res;
        if(curMode === "OPENING") res = await sb.from("monthly_stock").upsert(rows.map(r => ({ product_code: r.code, opening_quantity: r.qty, month_year: month, user_id: user.id })), { onConflict: 'month_year,product_code,user_id' });
        else if(curMode === "SALES") res = await sb.from("sales").insert(rows.map(r => ({ product_code: r.code, qty_sold: r.qty, month_ref: month, user_id: user.id })));
        else if(curMode === "RECEIVED") res = await sb.from("received_stock").insert(rows.map(r => ({ product_code: r.code, qty_received: r.qty, month_ref: month, user_id: user.id })));

        if(res.error) alert(res.error.message); else { alert("Data Synced Successfully!"); draw(); loadReport(); }
    }

    async function loadReport() {
        const month = document.getElementById("m-picker").value;
        const { data: o } = await sb.from("monthly_stock").select("*").eq('month_year', month);
        const { data: s } = await sb.from("sales").select("*").eq('month_ref', month);
        const { data: r } = await sb.from("received_stock").select("*").eq('month_ref', month);

        const report = items.map(i => {
            const open = o?.find(x => x.product_code === i.c)?.opening_quantity || 0;
            const sold = s?.filter(x => x.product_code === i.c).reduce((a, b) => a + b.qty_sold, 0) || 0;
            const recv = r?.filter(x => x.product_code === i.c).reduce((a, b) => a + b.qty_received, 0) || 0;
            return { name: i.n, open, recv, sold, stock: (open + recv - sold) };
        }).filter(x => x.open || x.recv || x.sold);

        document.getElementById("s-total").innerText = report.length;
        const top = [...report].sort((a,b) => b.sold - a.sold)[0];
        document.getElementById("s-top").innerText = top ? top.name : "---";

        document.getElementById("rpt-list").innerHTML = report.map(d => `
            <div class="card">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                    <b style="font-size:14px;">${d.name}</b>
                    <span style="font-weight:900; color:${d.stock < 5 ? 'var(--warn)' : 'var(--success)'}">${d.stock}</span>
                </div>
                <div style="font-size:11px; color:#64748b; display:flex; justify-content:space-between; background:#f8fafc; padding:8px; border-radius:10px;">
                    <span>IN: ${d.open}</span><span>REC: ${d.recv}</span><span>OUT: ${d.sold}</span>
                </div>
            </div>
        `).join("");
        window.rptData = report;
    }

  function exportPDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    const month = document.getElementById("m-picker").value;
    
    // --- BRANDING ---
    // Deep Royal Navy Header (Professional & Bold)
    doc.setFillColor(15, 23, 42); 
    doc.rect(0, 0, 210, 40, 'F');
    
    // White Text for Header
    doc.setTextColor(255, 255, 255);
    doc.setFontSize(22);
    doc.setFont("helvetica", "bold");
    doc.text("DYNAPHARM ERP REPORT", 14, 25);
    
    // Sub-info
    doc.setFontSize(10);
    doc.setFont("helvetica", "normal");
    doc.text(`INVENTORY SUMMARY: ${month.toUpperCase()}`, 14, 33);

    // --- TABLE ---
    doc.autoTable({
        startY: 45,
        head: [['PRODUCT NAME', 'OPEN', 'RECV', 'SOLD', 'BALANCE']],
        body: window.rptData.map(x => [
            x.name, 
            x.open, 
            x.recv, 
            x.sold, 
            { content: x.stock, styles: { fontStyle: 'bold' } }
        ]),
        headStyles: { 
            fillColor: [249, 115, 22], // Vibrant Orange
            textColor: [255, 255, 255],
            fontSize: 11
        },
        alternateRowStyles: {
            fillColor: [248, 250, 252] // Very light grey for readability
        },
        styles: {
            lineColor: [226, 232, 240],
            lineWidth: 0.1,
        }
    });

    doc.save(`Dynapharm_Report_${month.replace(' ', '_')}.pdf`);
}

</script>
</body>
</html>
