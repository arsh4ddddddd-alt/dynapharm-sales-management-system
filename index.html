<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dynapharm ERP v16</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root { --p: #003366; --s: #059669; --bg: #f1f5f9; --w: #ffffff; --accent: #3b82f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; }
        .app { width: 100%; max-width: 500px; background: var(--w); min-height: 100vh; display: flex; flex-direction: column; box-shadow: 0 0 20px rgba(0,0,0,0.1); }
        .hidden { display: none !important; }
        .header { background: var(--p); color: white; padding: 25px; text-align: center; border-radius: 0 0 25px 25px; }
        .content { padding: 20px; flex-grow: 1; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 10px; }
        .menu-card { background: white; border: 2px solid #e2e8f0; border-radius: 15px; padding: 20px; text-align: center; cursor: pointer; transition: 0.2s; }
        .menu-card:active { transform: scale(0.95); background: #f8fafc; }
        .menu-card i { font-size: 24px; display: block; margin-bottom: 10px; }
        input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd; margin-bottom: 10px; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; margin-bottom: 10px; text-transform: uppercase; }
        .btn-p { background: var(--p); color: white; }
        .btn-s { background: var(--s); color: white; }
        .card { background: #f8fafc; padding: 12px; border-radius: 10px; margin-bottom: 8px; border-left: 4px solid var(--p); display: flex; justify-content: space-between; align-items: center; }
        #console { background: #000; color: #0f0; padding: 8px; font-family: monospace; font-size: 10px; }
    </style>
</head>
<body>
<div class="app">
    <div id="v-auth">
        <div class="header"><h1>DYNAPHARM</h1><p>ERP SYSTEM</p></div>
        <div class="content">
            <input type="text" id="user" placeholder="Username">
            <input type="password" id="pass" placeholder="Password">
            <button class="btn btn-p" onclick="handleAuth()">Login</button>
            <button class="btn" style="background:#64748b; color:white;" onclick="toggleAuth()">Register</button>
        </div>
    </div>

    <div id="v-dash" class="hidden">
        <div class="header"><h2>DASHBOARD</h2><p id="u-tag"></p></div>
        <div class="content">
            <div class="grid">
                <div class="menu-card" onclick="openEntry('OPENING')">📦<br>Opening Stock</div>
                <div class="menu-card" onclick="openEntry('RECEIVED')" style="border-color: var(--accent);">🚚<br>Stock Received</div>
                <div class="menu-card" onclick="openEntry('SALES')" style="border-color: #ef4444;">💰<br>Daily Sales</div>
                <div class="menu-card" onclick="loadFullReport()" style="border-color: var(--s);">📊<br>Monthly Report</div>
            </div>
            <button class="btn" style="margin-top:40px; color:#ef4444;" onclick="location.reload()">Logout</button>
        </div>
    </div>

    <div id="v-entry" class="hidden">
        <div class="content">
            <h3 id="entry-title">Entry</h3>
            <input type="text" placeholder="Search product..." oninput="draw(this.value)">
            <div id="list" style="max-height: 350px; overflow-y: auto; margin-bottom: 15px;"></div>
            <button class="btn btn-s" onclick="saveEntry()">Save Entry</button>
            <button class="btn btn-p" onclick="showV('v-dash')">Back</button>
        </div>
    </div>

    <div id="v-rpt" class="hidden">
        <div class="content">
            <h3>Inventory Summary</h3>
            <button class="btn btn-p" style="background:red;" onclick="exportPDF()">Download PDF Report</button>
            <div id="rpt-list" style="max-height: 400px; overflow-y: auto;"></div>
            <button class="btn btn-p" onclick="showV('v-dash')" style="margin-top:10px;">Back</button>
        </div>
    </div>

    <div id="console">> System Ready</div>
</div>

<script>
    const _URL = "https://ywmlvtdrwijnhqdypteu.supabase.co";
    const _KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl3bWx2dGRyd2lqbmhxZHlwdGV1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI5MDM2NjIsImV4cCI6MjA4ODQ3OTY2Mn0.8-CE8qchVD8NcBX-_FDgegsjTxNMwd9IN7oNe5qeTpg";
    const sb = supabase.createClient(_URL, _KEY);

    let isL = true; let currentMode = ''; let reportData = [];
    const items = [{c:"DRC1201", n:"GINKO & GINSENG COFFEE"}, {c:"DRC1202", n:"GANODERMA GREEN TEA"}, {c:"DRC1203", n:"KACIP FATIMA GANO"}, {c:"DRC1204", n:"TONGKAT & MACCA"}, {c:"DRC1802A", n:"LIQUID ALFALFA 500ML"}, {c:"DRC1804", n:"GANODERMA COFFEE"}, {c:"DRC1810", n:"YEE GANO 90s"}, {c:"DRC1811", n:"YEEGARLIC 90s"}, {c:"DRC2802", n:"GOAT MILK 150s"}, {c:"DRC2805", n:"SPIRULINA 60s"}, {c:"DRC3804A", n:"DYNA TONIC 500ML"}, {c:"DRC4824A", n:"SEA CUCUMBER 500ML"}];

    async function handleAuth() {
        const u = document.getElementById('user').value; const p = document.getElementById('pass').value;
        const email = u + "@dyna.pro";
        const { error } = isL ? await sb.auth.signInWithPassword({email, password:p}) : await sb.auth.signUp({email, password:p});
        if(error) alert(error.message); else { document.getElementById('u-tag').innerText = "User: " + u.toUpperCase(); showV('v-dash'); }
    }

    function showV(id) { document.querySelectorAll('.app > div').forEach(d => { if(d.id !== 'console') d.classList.add('hidden'); }); document.getElementById(id).classList.remove('hidden'); }

    function openEntry(mode) { currentMode = mode; document.getElementById('entry-title').innerText = mode + " ENTRY"; showV('v-entry'); draw(); }

    function draw(f = "") {
        document.getElementById('list').innerHTML = items.filter(i => i.n.includes(f.toUpperCase())).map(i => `
            <div class="card">
                <div><b>${i.n}</b></div>
                <input type="number" class="qty-in" data-c="${i.c}" style="width:60px; margin:0;" placeholder="0">
            </div>`).join('');
    }

    async function saveEntry() {
        const { data: { user } } = await sb.auth.getUser();
        const rows = Array.from(document.querySelectorAll('.qty-in')).map(i => ({
            product_code: i.dataset.c, 
            qty: parseInt(i.value) || 0,
            user_id: user.id
        })).filter(x => x.qty > 0);

        if(rows.length === 0) return alert("Enter quantities!");
        
        let error;
        if(currentMode === 'OPENING') {
            const upData = rows.map(r => ({ month_year: "March 2026", product_code: r.product_code, opening_quantity: r.qty, user_id: r.user_id }));
            const res = await sb.from('monthly_stock').upsert(upData, { onConflict: 'month_year,product_code,user_id' });
            error = res.error;
        } else if(currentMode === 'SALES') {
            const res = await sb.from('sales').insert(rows.map(r => ({ product_code: r.product_code, qty_sold: r.qty, user_id: r.user_id })));
            error = res.error;
        } else if(currentMode === 'RECEIVED') {
            const res = await sb.from('received_stock').insert(rows.map(r => ({ product_code: r.product_code, qty_received: r.qty, user_id: r.user_id })));
            error = res.error;
        }

        if(error) alert(error.message); else { alert("Saved!"); showV('v-dash'); }
    }

    async function loadFullReport() {
        showV('v-rpt');
        const rList = document.getElementById('rpt-list');
        rList.innerHTML = "Calculating...";
        
        const { data: open } = await sb.from('monthly_stock').select('*');
        const { data: sales } = await sb.from('sales').select('*');
        const { data: recv } = await sb.from('received_stock').select('*');

        reportData = items.map(item => {
            const op = open.find(o => o.product_code === item.c)?.opening_quantity || 0;
            const sl = sales.filter(s => s.product_code === item.c).reduce((a, b) => a + b.qty_sold, 0);
            const rc = recv.filter(r => r.product_code === item.c).reduce((a, b) => a + b.qty_received, 0);
            return { name: item.n, code: item.c, opening: op, received: rc, sales: sl, closing: (op + rc - sl) };
        }).filter(x => x.opening > 0 || x.received > 0 || x.sales > 0);

        rList.innerHTML = reportData.map(d => `
            <div class="card" style="flex-direction:column; align-items:flex-start;">
                <b>${d.name}</b>
                <div style="font-size:12px; display:flex; gap:10px; margin-top:5px;">
                    <span>In: ${d.opening}</span> <span>+Recv: ${d.received}</span> <span>-Sold: ${d.sales}</span> 
                    <span style="color:green; font-weight:bold;">Final: ${d.closing}</span>
                </div>
            </div>`).join('');
    }

    function exportPDF() {
        const { jsPDF } = window.jspdf; const doc = new jsPDF();
        doc.text("DYNAPHARM MONTHLY REPORT", 14, 20);
        const rows = reportData.map(d => [d.code, d.name, d.opening, d.received, d.sales, d.closing]);
        doc.autoTable({ head: [['Code', 'Product', 'Open', 'Recv', 'Sold', 'Final']], body: rows, startY: 30 });
        doc.save("Full_Report.pdf");
    }

    function toggleAuth() { isL = !isL; alert(isL ? "Login" : "Register"); }
</script>
</body>
</html>
