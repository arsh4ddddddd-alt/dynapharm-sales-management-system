<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynapharm Pro Cloud</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/css/intlTelInput.css"/>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #003366; --accent: #ffcc00; --bg: #f8fafc; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; width: 100%; max-width: 400px; padding: 2rem; border-radius: 24px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; }
        .hidden { display: none; }
        h2 { color: var(--primary); text-align: center; margin-bottom: 1.5rem; font-weight: 800; letter-spacing: -0.025em; }
        .input-group { margin-bottom: 1.25rem; }
        label { display: block; font-size: 0.875rem; font-weight: 600; color: #475569; margin-bottom: 0.5rem; }
        input { width: 100%; padding: 0.75rem 1rem; border-radius: 12px; border: 1.5px solid #e2e8f0; font-size: 1rem; transition: all 0.2s; box-sizing: border-box; }
        input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 3px rgba(0,51,102,0.1); }
        button { width: 100%; padding: 0.75rem; border-radius: 12px; border: none; background: var(--primary); color: white; font-weight: 700; font-size: 1rem; cursor: pointer; transition: all 0.2s; }
        button:hover { background: #002244; transform: translateY(-1px); }
        .toggle-link { text-align: center; margin-top: 1rem; font-size: 0.875rem; color: #64748b; }
        .toggle-link b { color: var(--primary); cursor: pointer; text-decoration: underline; }
        .iti { width: 100%; }
        /* Loader */
        .spinner { border: 3px solid rgba(255,255,255,0.3); border-radius: 50%; border-top: 3px solid white; width: 20px; height: 20px; animation: spin 0.8s linear infinite; display: inline-block; margin-right: 8px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="card">
    <div id="auth-section">
        <h2 id="auth-title">Welcome Back</h2>
        
        <div class="input-group">
            <label>Phone Number</label>
            <input type="tel" id="phone-input">
        </div>

        <div class="input-group">
            <label>Secure Password</label>
            <input type="password" id="password-input" placeholder="••••••••">
        </div>

        <button id="submit-btn" onclick="processAuth()">Login to Cloud</button>
        
        <div class="toggle-link" id="toggle-area">
            New user? <b onclick="toggleMode()">Create Account</b>
        </div>
    </div>

    <div id="success-section" class="hidden">
        <h2 style="color: #059669;">✓ Access Granted</h2>
        <p style="text-align:center; color: #64748b;">Loading your Dynapharm Dashboard...</p>
        <button onclick="location.reload()" style="background: #64748b;">Logout</button>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/js/intlTelInput.min.js"></script>
<script>
    // Initialize Phone Input with DRC as default
    const phoneInput = document.querySelector("#phone-input");
    const iti = window.intlTelInput(phoneInput, {
        initialCountry: "cd",
        separateDialCode: true,
        utilsScript: "https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/js/utils.js"
    });

    // Supabase Setup
    const supabaseClient = supabase.createClient(
        "https://ywmlvtdrwijnhqdypteu.supabase.co", 
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl3bWx2dGRyd2lqbmhxZHlwdGV1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI5MDM2NjIsImV4cCI6MjA4ODQ3OTY2Mn0.8-CE8qchVD8NcBX-_FDgegsjTxNMwd9IN7oNe5qeTpg"
    );

    let isLoginMode = true;

    function toggleMode() {
        isLoginMode = !isLoginMode;
        document.getElementById('auth-title').innerText = isLoginMode ? "Welcome Back" : "Create Account";
        document.getElementById('submit-btn').innerText = isLoginMode ? "Login to Cloud" : "Create Account";
        document.getElementById('toggle-area').innerHTML = isLoginMode ? 
            'New user? <b onclick="toggleMode()">Create Account</b>' : 
            'Have an account? <b onclick="toggleMode()">Login</b>';
    }

    async function processAuth() {
        const btn = document.getElementById('submit-btn');
        const password = document.getElementById('password-input').value;
        
        // 1. Get the full number correctly
        const fullNumber = iti.getNumber();
        
        if (!fullNumber) {
            alert("Please enter a valid phone number.");
            return;
        }

        if (password.length < 6) {
            alert("Password must be at least 6 characters.");
            return;
        }

        // 2. Create the virtual email (Safe for free Supabase tier)
        const virtualEmail = fullNumber.replace('+', '') + "@dynapharm.cloud";

        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span> Connecting...';

        try {
            const { data, error } = isLoginMode 
                ? await supabaseClient.auth.signInWithPassword({ email: virtualEmail, password: password })
                : await supabaseClient.auth.signUp({ email: virtualEmail, password: password });

            if (error) throw error;

            // Success
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('success-section').classList.remove('hidden');
            
        } catch (err) {
            alert("Error: " + err.message);
            btn.disabled = false;
            btn.innerText = isLoginMode ? "Login to Cloud" : "Create Account";
        }
    }
</script>
</body>
</html>
