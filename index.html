<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dynapharm ERP</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>

<style>

body{
font-family:system-ui;
margin:0;
background:#f1f5f9;
padding-bottom:120px;
}

.hidden{display:none}

.header{
background:#0f172a;
color:white;
padding:25px;
border-radius:0 0 25px 25px;
}

.stats{
display:flex;
gap:10px;
margin-top:15px;
}

.stat{
flex:1;
background:rgba(255,255,255,0.1);
padding:10px;
border-radius:12px;
}

.content{
max-width:500px;
margin:auto;
padding:15px;
}

.card{
background:white;
padding:15px;
border-radius:14px;
margin-bottom:10px;
border:1px solid #e2e8f0;
}

input{
width:70px;
padding:10px;
border-radius:10px;
border:1px solid #cbd5e1;
text-align:center;
}

.search{
width:100%;
padding:12px;
margin-bottom:10px;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:12px;
font-weight:bold;
cursor:pointer;
margin-top:10px;
}

.primary{background:#2563eb;color:white}
.success{background:#059669;color:white}

.nav{
position:fixed;
bottom:15px;
left:50%;
transform:translateX(-50%);
width:92%;
max-width:450px;
background:#1e293b;
display:flex;
padding:10px;
border-radius:20px;
}

.nav div{
flex:1;
text-align:center;
color:#94a3b8;
font-size:12px;
cursor:pointer;
}

.nav .active{color:white}

.low{color:#dc2626;font-weight:bold}

</style>
</head
