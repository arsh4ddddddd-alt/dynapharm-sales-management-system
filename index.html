<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Depot Master Inventory System</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; background: #f0f4f8; }
        .card { max-width: 1100px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #0d47a1; text-align: center; margin-bottom: 20px; }
        #drop-area { border: 3px dashed #1976d2; padding: 40px; text-align: center; border-radius: 12px; background: #e3f2fd; cursor: pointer; transition: 0.3s; }
        #drop-area:hover { background: #d1e9ff; }
        .btn-green { background: #2e7d32; color: white; border: none; padding: 18px; width: 100%; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; display: none; margin-top: 20px; }
        .status-bar { margin: 15px 0; padding: 10px; border-radius: 5px; background: #e8f5e9; color: #2e7d32; display: none; text-align: center; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 11px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background: #1976d2; color: white; }
        .date-row { background: #f1f5f9; font-weight: bold; color: #334155; }
    </style>
</head>
<body>

<div class="card">
    <h1>📦 Depot Global Stock Intelligence</h1>
    <div id="drop-area" onclick="document.getElementById('filePicker').click()">
        <strong>Drop All Shop PDFs Here</strong>
        <p style="font-size: 13px; color: #556;">The system will scan all pages and all dates automatically</p>
        <input type="file" id="filePicker" multiple accept="application/pdf" style="display:none">
    </div>

    <div id="status" class="status-bar"></div>

    <button id="downloadBtn" class="btn-green">GENERATE FULL MULTI-DATE REPORT</button>
    <div id="preview"></div>
</div>

<script>
    const { jsPDF } = window.jspdf;
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

    let masterLedger = []; // Stores everything: {shop, date, product, qty, value}

    document.getElementById('filePicker').addEventListener('change', async (e) => {
        const files = e.target.files;
        if (!files.length) return;

        masterLedger = [];
        const status = document.getElementById('status');
        status.style.display = 'block';
        status.innerText = "Processing all pages and dates...";

        for (const file of files) {
            const arrayBuffer = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument(arrayBuffer).promise;

            // LOOP THROUGH EVERY PAGE OF THE PDF
            for (let p = 1; p <= pdf.numPages; p++) {
                const page = await pdf.getPage(p);
                const text = await page.getTextContent();
                const rawStrings = text.items.map(i => i.str.replace(/[\\"\r\n]/g, '').trim()).filter(s => s !== "");

                // Logic to find Shop and Date on each page
                let currentShop = "Unknown Shop";
                let currentDate = "Unknown Date";

                // Look for common headers
                for(let s=0; s < Math.min(10, rawStrings.length); s++) {
                    if(rawStrings[s].includes("DEPOT TO")) currentShop = rawStrings[s];
                    // Basic date detection (looking for month names or years)
                    if(/JANUARY|FEBRUARY|MARCH|APRIL|MAY|JUNE|JULY|AUGUST|SEPTEMBER|OCTOBER|NOVEMBER|DECEMBER|\d{4}/i.test(rawStrings[s])) {
                        currentDate = rawStrings[s];
                    }
                }

                // Scan items on the page
                for (let i = 0; i < rawStrings.length; i++) {
                    if (rawStrings[i].includes('$') && i > 1) {
                        const amount = parseFloat(rawStrings[i].replace(/[$,]/g, '')) || 0;
                        const qty = parseInt(rawStrings[i-1]) || 0;
                        const product = rawStrings[i-2] || "Unknown Item";

                        if (qty > 0) {
                            masterLedger.push({
                                shop: currentShop,
                                date: currentDate,
                                product: product,
                                qty: qty,
                                value: amount
                            });
                        }
                    }
                }
            }
        }
        
        status.innerText = `Successfully scanned ${files.length} files. Found ${masterLedger.length} total entries.`;
        showPreview();
    });

    function showPreview() {
        if (masterLedger.length === 0) return;
        let html = "<table><thead><tr><th>Date</th><th>Shop</th><th>Product</th><th>Stock In/Out</th><th>Total Value</th></tr></thead><tbody>";
        
        // Sort by Date then Shop
        masterLedger.sort((a, b) => a.date.localeCompare(b.date) || a.shop.localeCompare(b.shop));

        masterLedger.forEach(item => {
            html += `<tr>
                <td>${item.date}</td>
                <td style="color:#1976d2; font-weight:bold;">${item.shop}</td>
                <td>${item.product}</td>
                <td>${item.qty}</td>
                <td>$${item.value.toFixed(2)}</td>
            </tr>`;
        });

        html += "</tbody></table>";
        document.getElementById('preview').innerHTML = html;
        document.getElementById('downloadBtn').style.display = 'block';
    }

    document.getElementById('downloadBtn').addEventListener('click', () => {
        const doc = new jsPDF('l', 'mm', 'a4');
        let y = 20;

        doc.setFontSize(18);
        doc.text("MASTER DEPOT STOCK MOVEMENT LEDGER", 14, 15);
        doc.setFontSize(10);
        doc.text("Consolidated Report - All Dates & All Locations", 14, 22);

        const rows = masterLedger.map(item => [
            item.date,
            item.shop,
            item.product,
            item.qty, // Stock In
            item.qty, // Stock Out
            `$${item.value.toFixed(2)}`
        ]);

        doc.autoTable({
            startY: 30,
            head: [['Movement Date', 'Destination Shop', 'Item Description', 'Stock In', 'Stock Out', 'Total Value']],
            body: rows,
            theme: 'grid',
            headStyles: { fillColor: [13, 71, 161] },
            columnStyles: {
                0: { cellWidth: 35 },
                1: { cellWidth: 50, fontStyle: 'bold' }
            },
            didDrawPage: (data) => {
                // Footer
                doc.setFontSize(8);
                doc.text(`Page ${doc.internal.getNumberOfPages()}`, data.settings.margin.left, doc.internal.pageSize.height - 10);
            }
        });

        doc.save(`Depot_Master_Stock_Report_${new Date().toLocaleDateString()}.pdf`);
    });
</script>

</body>
</html>
