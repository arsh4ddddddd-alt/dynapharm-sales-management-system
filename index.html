<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InstaCheck ZIP</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.min.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #fafafa; padding: 20px; display: flex; justify-content: center; }
        .card { background: white; border: 1px solid #dbdbdb; border-radius: 12px; padding: 25px; width: 100%; max-width: 400px; text-align: center; }
        .upload-area { border: 2px dashed #0095f6; padding: 30px; border-radius: 10px; margin-bottom: 20px; background: #f0f9ff; }
        button { width: 100%; padding: 14px; background: #0095f6; color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 16px; }
        #results { margin-top: 25px; text-align: left; display: none; }
        .user-row { padding: 12px; border-bottom: 1px solid #efefef; }
        .user-row a { text-decoration: none; color: #00376b; font-weight: 600; }
        .status { font-size: 12px; color: #8e8e8e; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h2>Unfollower Finder</h2>
    <p class="status">Upload the <b>.zip</b> file Instagram sent you</p>
    
    <div class="upload-area">
        <input type="file" id="zipFile" accept=".zip">
    </div>

    <button onclick="processZip()">Analyze ZIP File</button>

    <div id="results">
        <h3 id="countHeader" style="font-size: 16px;">Results:</h3>
        <div id="resultList"></div>
    </div>
</div>

<script>
    async function processZip() {
        const fileInput = document.getElementById('zipFile');
        if (!fileInput.files.length) return alert("Please select your Instagram .zip file!");

        const file = fileInput.files[0];
        const zip = await JSZip.loadAsync(file);
        
        let followers = new Set();
        let following = new Set();

        // 1. Find and read followers.json
        const followersFile = zip.file(/followers_1\.json|followers\.json/)[0];
        // 2. Find and read following.json
        const followingFile = zip.file(/following\.json/)[0];

        if (!followersFile || !followingFile) {
            alert("Could not find the correct files inside the ZIP. Make sure you downloaded 'Followers and Following' data.");
            return;
        }

        const followersData = JSON.parse(await followersFile.async("string"));
        const followingData = JSON.parse(await followingFile.async("string"));

        // Extracting usernames from Instagram's specific JSON structure
        followingData.relationships_following.forEach(item => {
            following.add(item.string_list_data[0].value);
        });

        followersData.forEach(item => {
            followers.add(item.string_list_data[0].value);
        });

        const listDiv = document.getElementById('resultList');
        listDiv.innerHTML = '';
        let count = 0;

        following.forEach(user => {
            if (!followers.has(user)) {
                const div = document.createElement('div');
                div.className = 'user-row';
                div.innerHTML = `<a href="https://instagram.com/${user}" target="_blank">@${user}</a>`;
                listDiv.appendChild(div);
                count++;
            }
        });

        document.getElementById('countHeader').textContent = `${count} people not following back:`;
        document.getElementById('results').style.display = 'block';
    }
</script>

</body>
</html>
