<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Depot Smart Ledger Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #0f172a; color: #f8fafc; padding: 20px; }
        .container { max-width: 1100px; margin: auto; background: #1e293b; padding: 30px; border-radius: 15px; border: 1px solid #334155; }
        h1 { text-align: center; color: #38bdf8; margin-bottom: 20px; }
        #drop-zone { border: 2px dashed #38bdf8; padding: 40px; text-align: center; border-radius: 12px; background: rgba(56, 189, 248, 0.05); cursor: pointer; }
        .btn-action { background: #10b981; color: white; border: none; padding: 18px; width: 100%; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; display: none; margin-top: 20px; }
        .status { text-align: center; margin: 15px 0; color: #94a3b8; font-family: monospace; }
        .preview-group { margin-top: 25px; border: 1px solid #334155; border-radius: 8px; overflow: hidden; margin-bottom: 20px; }
        .group-header { background: #334155; padding: 12px; color: #fbbf24; font-weight: bold; display: flex; justify-content: space-between; }
        table { width: 100%; border-collapse: collapse; background: #1e293b; color: white; }
        th, td { border: 1px solid #334155; padding: 10px; text-align: left; }
        th { background: #0f172a; color: #38bdf8; font-size: 11px; text-transform: uppercase; }
        .total-row { background: #0f172a; font-weight: bold; color: #10b981; }
    </style>
</head>
<body>

<div class="container">
    <h1>📦 Depot Global Ledger (Grouped)</h1>
    <div id="drop-zone" onclick="document.getElementById('fileInput').click()">
        <strong>DRAG & DROP ALL SHOP PDFs</strong>
        <p>The system will group products by Date and Destination automatically.</p>
        <input type="file" id="fileInput" multiple accept="application/pdf" style="display:none">
    </div>

    <div id="status" class="status">System Ready</div>
    <button id="exportBtn" class="btn-action">DOWNLOAD GROUPED MASTER PDF</button>
    
    <div id="previewArea"></div>
</div>

<script>
    const { jsPDF } = window.jspdf;
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

    let groupedLedger = {}; // Structure: { "Date|Shop": [items] }

    document.getElementById('fileInput').addEventListener('change', async (e) => {
        const files = e.target.files;
        if (!files.length) return;

        groupedLedger = {};
        document.getElementById('status').innerText = "CLEANING AND GROUPING DATA...";

        for (const file of files) {
            const arrayBuffer = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument(arrayBuffer).promise;

            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const text = await page.getTextContent();
                const rawStrings = text.items.map(item => item.str.replace(/[\\"\r\n]/g, '').trim()).filter(s => s !== "");

                let header = rawStrings[0] || "";
                let shopName = "DEPOT";
                let reportDate = "UNKNOWN DATE";

                if (header.toUpperCase().includes("DEPOT TO")) {
                    const cleanHeader = header.toUpperCase().split("DEPOT TO")[1].trim();
                    const words = cleanHeader.split(" ");
                    shopName = words[0]; 
                    reportDate = words.slice(1).join(" ");
                }

                const groupKey = `${reportDate} | ${shopName}`;
                if (!groupedLedger[groupKey]) groupedLedger[groupKey] = [];

                for (let k = 0; k < rawStrings.length; k++) {
                    if (rawStrings[k].includes('$') && k > 1) {
                        const amount = parseFloat(rawStrings[k].replace(/[$,]/g, '')) || 0;
                        const qty = parseInt(rawStrings[k-1]) || 0;
                        const product = rawStrings[k-2] || "Item";

                        if (qty > 0) {
                            groupedLedger[groupKey].push({ product, qty, amount });
                        }
                    }
                }
            }
        }
        
        renderPreview();
    });

    function renderPreview() {
        const area = document.getElementById('previewArea');
        area.innerHTML = "";
        
        for (const key in groupedLedger) {
            let totalQty = 0;
            let totalVal = 0;
            
            let html = `<div class="preview-group">
                <div class="group-header"><span>📅 ${key}</span></div>
                <table><thead><tr><th>Product Description</th><th>Qty Out</th><th>Total Amount</th></tr></thead><tbody>`;
            
            groupedLedger[key].forEach(item => {
                totalQty += item.qty;
                totalVal += item.amount;
                html += `<tr><td>${item.product}</td><td>${item.qty}</td><td>$${item.amount.toFixed(2)}</td></tr>`;
            });

            html += `<tr class="total-row"><td>TOTAL FOR THIS MOVEMENT</td><td>${totalQty}</td><td>$${totalVal.toFixed(2)}</td></tr>`;
            html += `</tbody></table></div>`;
            area.innerHTML += html;
        }
        
        document.getElementById('status').innerText = "Grouping Complete.";
        document.getElementById('exportBtn').style.display = 'block';
    }

    document.getElementById('exportBtn').addEventListener('click', () => {
        const doc = new jsPDF('p', 'mm', 'a4');
        let y = 15;

        doc.setFontSize(16);
        doc.text("GLOBAL DEPOT DISTRIBUTION LEDGER", 14, y);
        y += 10;

        for (const key in groupedLedger) {
            if (y > 250) { doc.addPage(); y = 20; }
            
            doc.setFontSize(11);
            doc.setTextColor(251, 191, 36); // Yellow/Gold for headers
            doc.text(`MOVEMENT: ${key}`, 14, y);
            
            const rows = groupedLedger[key].map(r => [r.product, r.qty, `$${r.amount.toFixed(2)}`]);
            const groupTotalQty = groupedLedger[key].reduce((sum, i) => sum + i.qty, 0);
            const groupTotalVal = groupedLedger[key].reduce((sum, i) => sum + i.amount, 0);
            
            rows.push([{ content: 'GROUP TOTAL', styles: { fontStyle: 'bold' } }, groupTotalQty, `$${groupTotalVal.toFixed(2)}`]);

            doc.autoTable({
                startY: y + 2,
                head: [['Product Description', 'Qty Sent', 'Value']],
                body: rows,
                theme: 'grid',
                headStyles: { fillColor: [56, 189, 248] },
                styles: { fontSize: 8 }
            });
            
            y = doc.lastAutoTable.finalY + 12;
        }

        doc.save("Grouped_Depot_Report.pdf");
    });
</script>

</body>
</html>
