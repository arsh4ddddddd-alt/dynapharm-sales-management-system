<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dynapharm Cloud OS | Enterprise</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #003366; --secondary: #059669; --accent: #fbbf24; --bg: #f8fafc; --text: #1e293b; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; min-height: 100vh; }
        .app-container { width: 100%; max-width: 480px; background: white; min-height: 100vh; display: flex; flex-direction: column; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.1); }
        .hidden { display: none !important; }
        .header { background: var(--primary); color: white; padding: 30px 20px; text-align: center; border-radius: 0 0 30px 30px; }
        .content { padding: 25px; flex-grow: 1; }
        input { width: 100%; padding: 16px; border-radius: 12px; border: 2px solid #e2e8f0; font-size: 16px; box-sizing: border-box; margin-bottom: 15px; }
        .btn { width: 100%; padding: 18px; border-radius: 12px; border: none; font-size: 16px; font-weight: 800; cursor: pointer; text-transform: uppercase; margin-bottom: 10px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-success { background: var(--secondary); color: white; }
        .product-card { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid #f1f5f9; }
        .qty-field { width: 80px !important; text-align: center; margin: 0 !important; border: 2px solid #cbd5e1 !important; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="view-auth">
        <div class="header"><h1>DYNAPHARM ERP</h1><p>v4.6 Extreme Edition</p></div>
        <div class="content">
            <input type="text" id="username" placeholder="Username">
            <input type="password" id="password" placeholder="Password">
            <button class="btn btn-primary" id="auth-btn" onclick="executeAuth()">Login / Register</button>
            <p style="text-align:center; font-size:12px; color:#64748b;">Enter username and password.<br>If you don't have an account, it will be created automatically.</p>
        </div>
    </div>

    <div id="view-menu" class="hidden">
        <div class="header"><h1 id="user-title">WELCOME</h1></div>
        <div class="content">
            <button class="btn btn-success" style="height:100px;" onclick="showView('view-inventory')">📦 MONTHLY INVENTORY</button>
            <button class="btn" style="background:#64748b; color:white; margin-top:50px;" onclick="location.reload()">LOGOUT</button>
        </div>
    </div>

    <div id="view-inventory" class="hidden">
        <div class="content">
            <h2 style="color:var(--primary)">Stock Entry</h2>
            <input type="text" placeholder="🔍 Search products..." oninput="renderProducts(this.value)">
            <div id="product-list" style="max-height: 400px; overflow-y: auto;"></div>
            <button class="btn btn-success" id="save-btn" style="margin-top:20px;" onclick="commitToCloud()">SAVE TO CLOUD</button>
            <button class="btn" style="background:#64748b; color:white;" onclick="showView('view-menu')">BACK</button>
        </div>
    </div>
</div>

<script>
    // THE REFRESHED KEY
    const _URL = "https://ywmlvtdrwijnhqdypteu.supabase.co";
    const _KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl3bWx2dDRyd2lqbmhxZHlwdGV1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI5MDM2NjIsImV4cCI6MjA4ODQ3OTY2Mn0.8-CE8qchVD8NcBX-_FDgegsjTxNMwd9IN7oNe5qeTpg";
    const sb = supabase.createClient(_URL, _KEY);

    const items = [
        {c:"DRC1201", n:"GINKO & GINSENG COFFEE"}, {c:"DRC1202", n:"GANODERMA GREEN TEA"}, {c:"DRC1203", n:"KACIP FATIMA GANO"}, 
        {c:"DRC1204", n:"TONGKAT & MACCA"}, {c:"DRC1205", n:"CAPPUCCINO GANO"}, {c:"DRC1802A", n:"LIQUID ALFALFA 500ML"},
        {c:"DRC1804", n:"GANODERMA COFFEE"}, {c:"DRC1810", n:"YEE GANO 90s"}, {c:"DRC1811", n:"YEEGARLIC 90s"}, 
        {c:"DRC1814", n:"GANO CHOCO"}, {c:"DRC1817", n:"PRESIDENT COFFEE"}, {c:"DRC1818", n:"BLACK GANO"},
        {c:"DRC2802", n:"GOAT MILK 150s"}, {c:"DRC2804", n:"SOYA POWDER"}, {c:"DRC2805", n:"SPIRULINA 60s"}, 
        {c:"DRC2807", n:"SPIRULINA 300s"}, {c:"DRC2812", n:"WARISAN MAHARANI"}, {c:"DRC2813", n:"GINGER SOYA"},
        {c:"DRC2814", n:"PREMIX GOAT MILK"}, {c:"DRC3804", n:"DYNA TONIC 200ML"}, {c:"DRC3804A", n:"DYNA TONIC 500ML"},
        {c:"DRC3809", n:"YEE YANG YEN"}, {c:"DRC3810", n:"RED COFFEE GINSENG"}, {c:"DRC3812", n:"GREEN TEA 60s"}, 
        {c:"DRC3814", n:"PROLINK 20s"}, {c:"DRC4803", n:"GINSENG HONEY"}, {c:"DRC4805", n:"GINSENG 9x10"}, 
        {c:"DRC4810", n:"TONGKAT ALI COFFEE"}, {c:"DRC4811", n:"GINALI 100s"}, {c:"DRC4815", n:"YEEGINKGO 90s"}, 
        {c:"DRC4817", n:"MILK THISTLE"}, {c:"DRC4821", n:"TONGKAT ALI 100s"}, {c:"DRC4824", n:"SEA CUCUMBER 250ML"},
        {c:"DRC4824A", n:"SEA CUCUMBER 500ML"}, {c:"DRC5801", n:"CHLOROPHYLL SOAP"}, {c:"DRC5802", n:"GANO SOAP"}
    ];

    async function executeAuth() {
        const u = document.getElementById('username').value.trim();
        const p = document.getElementById('password').value;
        if(!u || p.length < 6) return alert("Username required and Password must be 6+ chars");
        
        const email = u.toLowerCase() + "@dyna.pro";
        const btn = document.getElementById('auth-btn');
        btn.innerText = "VERIFYING...";

        // Try login first
        let res = await sb.auth.signInWithPassword({ email, password: p });
        
        // If login fails, try signing up (Auto-register)
        if (res.error) {
            res = await sb.auth.signUp({ email, password: p });
        }

        if (res.error) {
            alert("SYSTEM ERROR: " + res.error.message);
            btn.innerText = "Login / Register";
        } else {
            document.getElementById('user-title').innerText = "HELLO, " + u.toUpperCase();
            showView('view-menu');
        }
    }

    function showView(id) {
        document.querySelectorAll('.app-container > div').forEach(d => d.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
        if(id === 'view-inventory') renderProducts();
    }

    function renderProducts(f = "") {
        const list = document.getElementById('product-list');
        list.innerHTML = items.filter(i => i.n.toLowerCase().includes(f.toLowerCase())).map(i => `
            <div class="product-card">
                <div><b>${i.n}</b><br><small>${i.c}</small></div>
                <input type="number" class="q" data-c="${i.c}" placeholder="0">
            </div>
        `).join('');
    }

    async function commitToCloud() {
        const btn = document.getElementById('save-btn');
        const data = Array.from(document.querySelectorAll('.q')).map(i => ({
            month_year: "March 2026",
            product_code: i.dataset.c,
            opening_quantity: parseInt(i.value) || 0
        })).filter(x => x.opening_quantity > 0);

        if(data.length === 0) return alert("Enter some quantities!");
        btn.innerText = "SAVING...";

        // THE PRO FIX: Upsert prevents duplicate key errors
        const { error } = await sb.from('monthly_stock').upsert(data, { onConflict: 'month_year,product_code' });

        if(error) alert("Error: " + error.message);
        else { alert("✅ INVENTORY SYNCED!"); showView('view-menu'); }
        btn.innerText = "SAVE TO CLOUD";
    }
</script>
</body>
</html>
