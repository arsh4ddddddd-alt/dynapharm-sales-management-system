<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynapharm Cloud</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/css/intlTelInput.css"/>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --p: #003366; --bg: #f8fafc; }
        body { font-family: sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; }
        .card { background: white; width: 100%; max-width: 400px; padding: 25px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .hidden { display: none; }
        input, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; }
        button { background: var(--p); color: white; font-weight: bold; cursor: pointer; border: none; }
        .prod-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; }
        .prod-row input { width: 70px; margin: 0; }
    </style>
</head>
<body>
<div class="card">
    <div id="auth-box">
        <h2 id="t" style="text-align:center">Cloud Login</h2>
        <input type="tel" id="phone">
        <input type="password" id="pass" placeholder="Password (6+ chars)">
        <button onclick="runAuth()">Enter System</button>
        <p style="text-align:center; font-size:14px">New? <b onclick="tMode()" style="color:blue; cursor:pointer">Create Account</b></p>
    </div>

    <div id="main-menu" class="hidden">
        <h2 style="text-align:center">Main Menu</h2>
        <button onclick="showUI('entry-box')" style="background:#059669">📦 Monthly Stock Entry</button>
        <button onclick="location.reload()" style="background:#64748b; margin-top:20px">Logout</button>
    </div>

    <div id="entry-box" class="hidden">
        <h2 style="text-align:center">Stock Entry</h2>
        <div id="list" style="max-height: 400px; overflow-y: auto;"></div>
        <button onclick="saveData()" style="background:#059669; margin-top:10px">Save to Cloud</button>
        <button onclick="showUI('main-menu')" style="background:#64748b">Back</button>
    </div>
</div>

<script>
    const iti = window.intlTelInput(document.querySelector("#phone"), { initialCountry: "cd", separateDialCode: true });
    const sb = supabase.createClient("https://ywmlvtdrwijnhqdypteu.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl3bWx2dGRyd2lqbmhxZHlwdGV1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI5MDM2NjIsImV4cCI6MjA4ODQ3OTY2Mn0.8-CE8qchVD8NcBX-_FDgegsjTxNMwd9IN7oNe5qeTpg");
    
    let isLogin = true;
    const prods = [{c:"DRC1201", n:"GINKO COFFEE"}, {c:"DRC1202", n:"GREEN TEA"}, {c:"DRC1802A", n:"ALFALFA"}, {c:"DRC2812", n:"MAHARANI"}];

    function tMode() { 
        isLogin = !isLogin; 
        document.getElementById('t').innerText = isLogin ? "Cloud Login" : "Create Account"; 
    }

    async function runAuth() {
        const fullNumber = iti.getNumber();
        if(!fullNumber) return alert("Enter phone number");

        // The Fix: Ensure the email format is perfect
        const email = fullNumber.replace('+', '') + "@dynapharm.cloud";
        const password = document.getElementById('pass').value;

        const { error } = isLogin 
            ? await sb.auth.signInWithPassword({email, password}) 
            : await sb.auth.signUp({email, password});

        if(error) alert(error.message); 
        else {
            if(!isLogin) alert("Account created! Now please Login.");
            showUI('main-menu');
        }
    }

    function showUI(id) {
        document.getElementById('auth-box').classList.add('hidden');
        document.getElementById('main-menu').classList.add('hidden');
        document.getElementById('entry-box').classList.add('hidden');
        document.getElementById(id).classList.remove('hidden');
        if(id === 'entry-box') loadProds();
    }

    function loadProds() {
        document.getElementById('list').innerHTML = prods.map(p => `
            <div class="prod-row"><span>${p.n}</span><input type="number" class="q" data-c="${p.c}" placeholder="0"></div>
        `).join('');
    }

    async function saveData() {
        const rows = Array.from(document.querySelectorAll('.q')).map(i => ({ 
            product_code: i.dataset.c, 
            opening_quantity: parseInt(i.value)||0, 
            month_year: "March 2026" 
        })).filter(r => r.opening_quantity > 0);

        const { error } = await sb.from('monthly_stock').upsert(rows);
        if(error) alert(error.message); else alert("Saved successfully!");
    }
</script>
</body>
</html>
