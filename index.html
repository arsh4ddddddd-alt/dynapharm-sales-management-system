<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Depot Smart Ledger Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #f8fafc; padding: 30px; }
        .container { max-width: 1100px; margin: auto; background: #1e293b; padding: 30px; border-radius: 15px; border: 1px solid #334155; }
        h1 { text-align: center; color: #38bdf8; margin-bottom: 20px; }
        #drop-zone { border: 2px dashed #38bdf8; padding: 50px; text-align: center; border-radius: 12px; background: rgba(56, 189, 248, 0.05); cursor: pointer; margin-bottom: 20px; }
        .btn-action { background: #10b981; color: white; border: none; padding: 18px; width: 100%; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; display: none; margin-top: 10px; }
        .btn-action:hover { background: #059669; }
        .status { text-align: center; margin: 10px 0; color: #94a3b8; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: #1e293b; color: white; font-size: 12px; }
        th, td { border: 1px solid #334155; padding: 10px; text-align: left; }
        th { background: #38bdf8; color: #0f172a; }
        .section-header { background: #334155; padding: 10px; font-weight: bold; color: #fbbf24; margin-top: 20px; border-radius: 4px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🚀 Depot Smart Ledger System</h1>
    <div id="drop-zone" onclick="document.getElementById('fileInput').click()">
        <strong>DRAG & DROP ALL SHOP PDFs</strong>
        <p>The system will calculate Total Stock In, Stock Out, and Destinations</p>
        <input type="file" id="fileInput" multiple accept="application/pdf" style="display:none">
    </div>

    <div id="status" class="status">Waiting for files...</div>
    <button id="exportBtn" class="btn-action">GENERATE FINAL MASTER LEDGER</button>
    
    <div id="previewArea"></div>
</div>

<script>
    const { jsPDF } = window.jspdf;
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

    let globalLedger = [];

    document.getElementById('fileInput').addEventListener('change', async (e) => {
        const files = e.target.files;
        if (!files.length) return;

        globalLedger = [];
        document.getElementById('status').innerText = "POWER SCANNING DOCUMENTS...";

        for (const file of files) {
            const arrayBuffer = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument(arrayBuffer).promise;

            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const text = await page.getTextContent();
                const rawStrings = text.items.map(item => item.str.replace(/[\\"\r\n]/g, '').trim()).filter(s => s !== "");

                // Logic to identify Shop and Date
                let header = rawStrings[0] || "";
                let shopName = "DEPOT";
                let reportDate = "UNKNOWN DATE";

                if (header.toUpperCase().includes("DEPOT TO")) {
                    const cleanHeader = header.toUpperCase().split("DEPOT TO")[1].trim();
                    const words = cleanHeader.split(" ");
                    shopName = words[0]; // Gets UPN, MASINA, etc.
                    reportDate = words.slice(1).join(" "); // Gets the Date
                }

                // Scan items
                for (let k = 0; k < rawStrings.length; k++) {
                    if (rawStrings[k].includes('$') && k > 1) {
                        const amount = parseFloat(rawStrings[k].replace(/[$,]/g, '')) || 0;
                        const qty = parseInt(rawStrings[k-1]) || 0;
                        const product = rawStrings[k-2] || "Item";

                        if (qty > 0) {
                            globalLedger.push({
                                shop: shopName,
                                date: reportDate,
                                item: product,
                                stockIn: qty,  // What came into the shop
                                stockOut: qty, // What left the depot
                                value: amount
                            });
                        }
                    }
                }
            }
        }
        
        document.getElementById('status').innerText = `Scanned ${globalLedger.length} items. Ready to export.`;
        document.getElementById('exportBtn').style.display = 'block';
        renderPreview();
    });

    function renderPreview() {
        const area = document.getElementById('previewArea');
        area.innerHTML = "<div class='section-header'>PREVIEW OF STOCK MOVEMENT</div>";
        let html = "<table><thead><tr><th>Date</th><th>Product</th><th>Destination</th><th>Qty In</th><th>Qty Out</th><th>Value</th></tr></thead><tbody>";
        
        globalLedger.forEach(r => {
            html += `<tr><td>${r.date}</td><td>${r.item}</td><td style="color:#38bdf8">${r.shop}</td><td>${r.stockIn}</td><td>${r.stockOut}</td><td>$${r.value.toFixed(2)}</td></tr>`;
        });
        
        html += "</tbody></table>";
        area.innerHTML += html;
    }

    document.getElementById('exportBtn').addEventListener('click', () => {
        const doc = new jsPDF('l', 'mm', 'a4');
        doc.setFontSize(18);
        doc.text("GLOBAL DEPOT INVENTORY LEDGER - CONSOLIDATED", 14, 15);
        
        // Group by shop for the table
        const rows = globalLedger.map(r => [r.date, r.item, `DEPOT -> ${r.shop}`, r.stockIn, r.stockOut, `$${r.value.toFixed(2)}`]);

        doc.autoTable({
            startY: 25,
            head: [['Date', 'Product Description', 'Movement Detail', 'Stock In', 'Stock Out', 'Total Amount']],
            body: rows,
            theme: 'grid',
            headStyles: { fillColor: [56, 189, 248] },
            styles: { fontSize: 8 }
        });

        doc.save("DEPOT_MASTER_LEDGER.pdf");
    });
</script>

</body>
</html>
