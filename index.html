<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InstaCheck Dual-File</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #fafafa; padding: 20px; display: flex; justify-content: center; }
        .card { background: white; border: 1px solid #dbdbdb; border-radius: 12px; padding: 25px; width: 100%; max-width: 400px; text-align: center; }
        .upload-section { text-align: left; margin-bottom: 15px; }
        label { font-size: 12px; font-weight: bold; color: #8e8e8e; display: block; margin-bottom: 5px; }
        input[type="file"] { width: 100%; margin-bottom: 10px; font-size: 13px; }
        button { width: 100%; padding: 14px; background: #0095f6; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        #results { margin-top: 25px; text-align: left; display: none; }
        .user-row { padding: 10px; border-bottom: 1px solid #efefef; font-size: 14px; }
        .user-row a { text-decoration: none; color: #00376b; font-weight: 600; }
        .stats { font-size: 12px; background: #f0f9ff; padding: 10px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #c0e0ff; }
    </style>
</head>
<body>

<div class="card">
    <h2>Unfollower Finder</h2>
    
    <div class="upload-section">
        <label>Upload following.json</label>
        <input type="file" id="followingFile" accept=".json">
        
        <label>Upload followers_1.json</label>
        <input type="file" id="followersFile" accept=".json">
    </div>

    <button onclick="processFiles()">Compare Lists</button>

    <div id="results">
        <div id="statBox" class="stats"></div>
        <h3 id="countHeader">Not Following Back:</h3>
        <div id="resultList"></div>
    </div>
</div>

<script>
    // This function finds every "value" (username) regardless of JSON structure
    function findUsernames(data) {
        let names = new Set();
        function search(obj) {
            if (!obj) return;
            if (typeof obj === 'object') {
                if (obj.value && typeof obj.value === 'string') {
                    names.add(obj.value);
                }
                for (let key in obj) search(obj[key]);
            }
        }
        search(data);
        return names;
    }

    async function processFiles() {
        const file1 = document.getElementById('followingFile').files[0];
        const file2 = document.getElementById('followersFile').files[0];

        if (!file1 || !file2) return alert("Please upload BOTH files!");

        try {
            const followingData = JSON.parse(await file1.text());
            const followersData = JSON.parse(await file2.text());

            const following = findUsernames(followingData);
            const followers = findUsernames(followersData);

            const listDiv = document.getElementById('resultList');
            listDiv.innerHTML = '';
            let count = 0;

            following.forEach(user => {
                if (!followers.has(user)) {
                    const div = document.createElement('div');
                    div.className = 'user-row';
                    div.innerHTML = `<a href="https://instagram.com/${user}" target="_blank">@${user}</a>`;
                    listDiv.appendChild(div);
                    count++;
                }
            });

            document.getElementById('statBox').innerHTML = `
                <b>Following:</b> ${following.size} <br>
                <b>Followers:</b> ${followers.size}
            `;
            document.getElementById('countHeader').innerText = `${count} People Found:`;
            document.getElementById('results').style.display = 'block';

        } catch (e) {
            alert("Error reading files. Make sure they are the JSON files from Instagram.");
        }
    }
</script>

</body>
</html>
