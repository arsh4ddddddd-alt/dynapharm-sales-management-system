<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dynapharm Cloud Pro | v8.0</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --p: #003366; --s: #059669; --bg: #f1f5f9; }
        body { font-family: system-ui, sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; min-height: 100vh; }
        .app { width: 100%; max-width: 480px; background: white; min-height: 100vh; display: flex; flex-direction: column; box-shadow: 0 0 40px rgba(0,0,0,0.1); }
        .hidden { display: none !important; }
        .header { background: var(--p); color: white; padding: 40px 20px; text-align: center; border-radius: 0 0 25px 25px; }
        .content { padding: 25px; flex-grow: 1; }
        input { width: 100%; padding: 16px; border-radius: 12px; border: 2px solid #e2e8f0; font-size: 16px; box-sizing: border-box; margin-bottom: 12px; }
        .btn { width: 100%; padding: 18px; border-radius: 12px; border: none; font-size: 16px; font-weight: 800; cursor: pointer; text-transform: uppercase; margin-bottom: 10px; }
        .btn-p { background: var(--p); color: white; }
        .btn-s { background: var(--s); color: white; }
        .btn-o { background: transparent; border: 2px solid var(--p); color: var(--p); }
        .item { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid #f1f5f9; }
        .q-in { width: 85px !important; text-align: center; border: 2px solid #cbd5e1 !important; font-weight: 900; margin: 0 !important; }
        #console { background: #000; color: #0f0; padding: 12px; font-family: monospace; font-size: 11px; min-height: 60px; word-break: break-all; }
    </style>
</head>
<body>
<div class="app">
    <div id="v-auth">
        <div class="header"><h1>DYNAPHARM</h1><p id="a-status">SYSTEM ACCESS</p></div>
        <div class="content">
            <input type="text" id="user" placeholder="Username">
            <input type="password" id="pass" placeholder="Password (6+ chars)">
            <button class="btn btn-p" id="b-auth" onclick="handleAuth()">Sign In</button>
            <button class="btn btn-o" onclick="toggleAuth()">Create New Account</button>
        </div>
    </div>

    <div id="v-dash" class="hidden">
        <div class="header"><h1>DASHBOARD</h1><p id="u-welcome"></p></div>
        <div class="content">
            <button class="btn btn-s" style="height:120px;" onclick="showV('v-stock')">📦 MONTHLY INVENTORY</button>
            <button class="btn btn-o" style="margin-top: 50px; color:red; border-color:red;" onclick="location.reload()">Logout</button>
        </div>
    </div>

    <div id="v-stock" class="hidden">
        <div class="content">
            <h2 style="color:var(--p); margin:0 0 10px 0;">Stock Entry</h2>
            <input type="text" placeholder="🔍 Search..." oninput="draw(this.value)">
            <div id="list" style="max-height: 400px; overflow-y: auto;"></div>
            <button class="btn btn-s" id="b-save" style="margin-top:20px;" onclick="save()">✅ SAVE TO CLOUD</button>
            <button class="btn btn-o" onclick="showV('v-dash')">Back</button>
        </div>
    </div>
    
    <div id="console">Initializing System...</div>
</div>

<script>
    // YOUR PROVIDED KEY
    const _U = "https://ywmlvtdrwijnhqdypteu.supabase.co";
    const _K = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl3bWx2dDRyd2lqbmhxZHlwdGV1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI5MDM2NjIsImV4cCI6MjA4ODQ3OTY2Mn0.8-CE8qchVD8NcBX-_FDgegsjTxNMwd9IN7oNe5qeTpg";
    
    let sb;
    const log = (m) => { document.getElementById('console').innerHTML = "> " + m; };

    try {
        sb = supabase.createClient(_U, _K, { auth: { persistSession: false } });
        log("Connection established with provided key.");
    } catch(e) {
        log("Client Error: " + e.message);
    }

    let isL = true;
    const items = [
        {c:"DRC1201", n:"GINKO & GINSENG COFFEE"}, {c:"DRC1202", n:"GANODERMA GREEN TEA"}, {c:"DRC1203", n:"KACIP FATIMA GANO"}, 
        {c:"DRC1204", n:"TONGKAT & MACCA"}, {c:"DRC1205", n:"CAPPUCCINO GANO"}, {c:"DRC1802A", n:"LIQUID ALFALFA 500ML"},
        {c:"DRC1804", n:"GANODERMA COFFEE"}, {c:"DRC1810", n:"YEE GANO 90s"}, {c:"DRC1811", n:"YEEGARLIC 90s"}, 
        {c:"DRC1814", n:"GANO CHOCO"}, {c:"DRC1817", n:"PRESIDENT COFFEE"}, {c:"DRC1818", n:"BLACK GANO"},
        {c:"DRC2802", n:"GOAT MILK 150s"}, {c:"DRC2804", n:"SOYA POWDER"}, {c:"DRC2805", n:"SPIRULINA 60s"}, 
        {c:"DRC2807", n:"SPIRULINA 300s"}, {c:"DRC2812", n:"WARISAN MAHARANI"}, {c:"DRC2813", n:"GINGER SOYA"},
        {c:"DRC2814", n:"PREMIX GOAT MILK"}, {c:"DRC3804", n:"DYNA TONIC 200ML"}, {c:"DRC3804A", n:"DYNA TONIC 500ML"},
        {c:"DRC3809", n:"YEE YANG YEN"}, {c:"DRC3810", n:"RED COFFEE GINSENG"}, {c:"DRC3812", n:"GREEN TEA 60s"}, 
        {c:"DRC3814", n:"PROLINK 20s"}, {c:"DRC4803", n:"GINSENG HONEY"}, {c:"DRC4805", n:"GINSENG 9x10"}, 
        {c:"DRC4810", n:"TONGKAT ALI COFFEE"}, {c:"DRC4811", n:"GINALI 100s"}, {c:"DRC4815", n:"YEEGINKGO 90s"}, 
        {c:"DRC4817", n:"MILK THISTLE"}, {c:"DRC4821", n:"TONGKAT ALI 100s"}, {c:"DRC4824", n:"SEA CUCUMBER 250ML"},
        {c:"DRC4824A", n:"SEA CUCUMBER 500ML"}, {c:"DRC5801", n:"CHLOROPHYLL SOAP"}, {c:"DRC5802", n:"GANO SOAP"}
    ];

    function toggleAuth() {
        isL = !isL;
        document.getElementById('a-status').innerText = isL ? "SYSTEM ACCESS" : "REGISTRATION";
        document.getElementById('b-auth').innerText = isL ? "Sign In" : "Create Account";
        log(isL ? "Mode: Sign-In" : "Mode: Sign-Up");
    }

    async function handleAuth() {
        const u = document.getElementById('user').value.trim();
        const p = document.getElementById('pass').value;
        if(!u || p.length < 6) return alert("Missing info or password too short.");
        
        log("Connecting to Supabase...");
        const email = u.toLowerCase() + "@dyna.pro";
        const b = document.getElementById('b-auth');
        b.innerText = "...";

        const { data, error } = isL 
            ? await sb.auth.signInWithPassword({ email, password: p })
            : await sb.auth.signUp({ email, password: p });

        if(error) {
            log("Auth Error: " + error.message);
            alert("Error: " + error.message);
            b.innerText = isL ? "Sign In" : "Create Account";
        } else {
            log("Success.");
            document.getElementById('u-welcome').innerText = "Hello, " + u.toUpperCase();
            showV('v-dash');
        }
    }

    function showV(id) {
        document.querySelectorAll('.app > div').forEach(d => { if(d.id !== 'console') d.classList.add('hidden'); });
        document.getElementById(id).classList.remove('hidden');
        if(id === 'v-stock') draw();
    }

    function draw(f = "") {
        const l = document.getElementById('list');
        l.innerHTML = items.filter(i => i.n.toLowerCase().includes(f.toLowerCase()) || i.c.toLowerCase().includes(f.toLowerCase())).map(i => `
            <div class="item">
                <div><b>${i.n}</b><br><small>${i.c}</small></div>
                <input type="number" class="q" data-c="${i.c}" placeholder="0">
            </div>
        `).join('');
    }

    async function save() {
        const b = document.getElementById('b-save');
        const data = Array.from(document.querySelectorAll('.q')).map(i => ({
            month_year: "March 2026",
            product_code: i.dataset.c,
            opening_quantity: parseInt(i.value) || 0
        })).filter(x => x.opening_quantity > 0);

        if(data.length === 0) return alert("No values entered.");
        b.innerText = "UPLOADING...";
        log("Upserting " + data.length + " rows...");

        const { error } = await sb.from('monthly_stock').upsert(data, { onConflict: 'month_year,product_code' });

        if(error) {
            log("DB Error: " + error.message);
            alert(error.message);
        } else {
            log("Cloud Sync Complete.");
            alert("✅ INVENTORY SYNCED!");
            showV('v-dash');
        }
        b.innerText = "✅ SAVE TO CLOUD";
    }
</script>
</body>
</html>
