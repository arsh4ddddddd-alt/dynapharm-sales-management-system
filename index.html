<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Depot Master Inventory Hub</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; background: #f0f4f8; color: #333; }
        .main-card { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h1 { color: #0d47a1; text-align: center; margin-bottom: 5px; }
        .subtitle { text-align: center; color: #667; margin-bottom: 25px; font-size: 14px; }
        #drop-area { border: 3px dashed #1976d2; padding: 40px; text-align: center; border-radius: 12px; background: #e3f2fd; cursor: pointer; transition: 0.3s; }
        #drop-area:hover { background: #bbdefb; }
        .btn-main { background: #2e7d32; color: white; border: none; padding: 18px; width: 100%; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; display: none; margin-top: 20px; }
        .log-box { margin-top: 20px; padding: 10px; background: #eee; border-radius: 5px; font-family: monospace; font-size: 12px; max-height: 150px; overflow-y: auto; display: none; }
        .summary-box { margin-top: 20px; padding: 20px; background: #fff9c4; border-left: 5px solid #fbc02d; border-radius: 5px; display: none; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; font-size: 13px; }
        th { background: #1976d2; color: white; }
    </style>
</head>
<body>

<div class="main-card">
    <h1>📦 Depot Master Reporter</h1>
    <p class="subtitle">Combine Masina, UPN, and other shop PDFs into one calculated report</p>

    <div id="drop-area" onclick="document.getElementById('fileSelector').click()">
        <strong>Click to select all your Shop PDF files</strong>
        <p style="font-size: 12px;">(Select multiple files at once)</p>
        <input type="file" id="fileSelector" multiple accept="application/pdf" style="display:none">
    </div>

    <div id="log" class="log-box"></div>

    <div id="summary" class="summary-box">
        <h3 style="margin-top:0;">Grand Total Summary</h3>
        <p id="totalQty">Total Items Moved: 0</p>
        <p id="totalVal">Total Value: $0.00</p>
    </div>

    <button id="exportBtn" class="btn-main">DOWNLOAD FINAL PDF REPORT</button>

    <div id="preview"></div>
</div>

<script>
    const { jsPDF } = window.jspdf;
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

    let groupedData = {};

    function addLog(msg) {
        const log = document.getElementById('log');
        log.style.display = 'block';
        log.innerHTML += `> ${msg}<br>`;
    }

    document.getElementById('fileSelector').addEventListener('change', async (e) => {
        const files = e.target.files;
        if (files.length === 0) return;

        groupedData = {};
        document.getElementById('log').innerHTML = '';
        document.getElementById('preview').innerHTML = '';
        addLog(`Started processing ${files.length} files...`);

        for (const file of files) {
            try {
                const arrayBuffer = await file.arrayBuffer();
                const pdf = await pdfjsLib.getDocument(arrayBuffer).promise;
                const page = await pdf.getPage(1);
                const textContent = await page.getTextContent();
                
                // DATA CLEANING STEP: Remove quotes, backslashes, and extra spaces
                const cleanStrings = textContent.items.map(item => 
                    item.str.replace(/[\\"\r\n]/g, '').trim()
                ).filter(s => s !== "");

                // The first string is usually the Shop Name (e.g., "DEPOT TO UPN")
                let shopName = cleanStrings[0] || file.name;
                if (!groupedData[shopName]) groupedData[shopName] = [];

                addLog(`Reading: ${shopName}...`);

                // Parse logic: Find items where a Quantity is followed by a Price
                for (let i = 0; i < cleanStrings.length; i++) {
                    const current = cleanStrings[i];
                    
                    // Look for the Price (contains $)
                    if (current.includes('$') && i > 1) {
                        const amountStr = current.replace(/[$,]/g, '');
                        const amount = parseFloat(amountStr) || 0;
                        const qty = parseInt(cleanStrings[i-1]) || 0;
                        const desc = cleanStrings[i-2] || "Unknown Item";

                        // Only add if there is actual stock being moved
                        if (qty > 0) {
                            groupedData[shopName].push({ desc, qty, amount });
                        }
                    }
                }
            } catch (err) {
                addLog(`Error reading ${file.name}: ${err.message}`);
            }
        }

        calculateTotals();
    });

    function calculateTotals() {
        let grandQty = 0;
        let grandVal = 0;
        let html = "";

        for (const shop in groupedData) {
            if (groupedData[shop].length === 0) continue;

            html += `<h3>${shop}</h3><table><thead><tr><th>Product</th><th>Qty</th><th>Total</th></tr></thead><tbody>`;
            groupedData[shop].forEach(item => {
                grandQty += item.qty;
                grandVal += item.amount;
                html += `<tr><td>${item.desc}</td><td>${item.qty}</td><td>$${item.amount.toFixed(2)}</td></tr>`;
            });
            html += `</tbody></table>`;
        }

        document.getElementById('preview').innerHTML = html;
        document.getElementById('totalQty').innerText = `Total Items Moved: ${grandQty}`;
        document.getElementById('totalVal').innerText = `Total Value: $${grandVal.toFixed(2)}`;
        
        if (grandQty > 0) {
            document.getElementById('summary').style.display = 'block';
            document.getElementById('exportBtn').style.display = 'block';
            addLog("Finished! You can now download the PDF.");
        } else {
            addLog("Warning: No quantities found. Check if your PDFs have stock counts.");
        }
    }

    document.getElementById('exportBtn').addEventListener('click', () => {
        const doc = new jsPDF();
        let y = 20;

        doc.setFontSize(18);
        doc.setTextColor(25, 118, 210);
        doc.text("DEPOT GLOBAL INVENTORY REPORT", 14, y);
        y += 10;
        doc.setFontSize(10);
        doc.setTextColor(100);
        doc.text(`Generated: ${new Date().toLocaleString()}`, 14, y);
        y += 15;

        for (const shop in groupedData) {
            if (groupedData[shop].length === 0) continue;

            const rows = groupedData[shop].map(item => [item.desc, item.qty, `$${item.amount.toFixed(2)}`]);

            doc.autoTable({
                startY: y,
                head: [[{ content: shop, colSpan: 3, styles: { halign: 'center', fillColor: [25, 118, 210] } }], ['Product Description', 'Qty Out', 'Total Value']],
                body: rows,
                theme: 'grid',
                styles: { fontSize: 8 }
            });
            y = doc.lastAutoTable.finalY + 10;
            if (y > 250) { doc.addPage(); y = 20; }
        }

        doc.save("DEPOT_FINAL_REPORT.pdf");
    });
</script>

</body>
</html>
