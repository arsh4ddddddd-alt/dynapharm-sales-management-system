<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Depot Inventory Reporter</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; background: #eef2f3; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h1 { color: #2c3e50; text-align: center; margin-bottom: 10px; }
        .upload-area { border: 2px dashed #3498db; padding: 30px; text-align: center; border-radius: 10px; background: #f9fbff; cursor: pointer; margin: 20px 0; }
        .btn { background: #27ae60; color: white; border: none; padding: 12px 25px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; font-size: 16px; display: none; }
        .btn:hover { background: #219150; }
        #status { text-align: center; color: #7f8c8d; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 25px; font-size: 14px; }
        th { background: #34495e; color: white; padding: 12px; text-align: left; }
        td { padding: 10px; border-bottom: 1px solid #ddd; }
        tr:nth-child(even) { background: #f8f9fa; }
    </style>
</head>
<body>

<div class="container">
    <h1>📦 Depot Inventory Hub</h1>
    <p style="text-align: center;">Combine shop reports (UPN, Masina, Botour) into one master PDF.</p>

    <div class="upload-area" onclick="document.getElementById('fileInput').click()">
        <strong>Click to select all your Shop PDFs</strong>
        <input type="file" id="fileInput" multiple accept="application/pdf" style="display:none">
    </div>

    <div id="status">No files loaded</div>
    
    <button id="downloadBtn" class="btn">Generate & Download Master Report (PDF)</button>

    <table id="previewTable">
        <thead>
            <tr>
                <th>Shop Name</th>
                <th>Product</th>
                <th>Qty</th>
                <th>Amount</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script>
    const { jsPDF } = window.jspdf;
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

    let allData = [];

    document.getElementById('fileInput').addEventListener('change', async (e) => {
        const files = e.target.files;
        if (files.length === 0) return;
        
        allData = [];
        document.getElementById('tableBody').innerHTML = '';
        document.getElementById('status').innerText = "Processing files...";

        for (const file of files) {
            const arrayBuffer = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument(arrayBuffer).promise;
            const page = await pdf.getPage(1);
            const textContent = await page.getTextContent();
            
            const strings = textContent.items.map(item => item.str);
            const shopName = strings[0] || file.name;

            // Look for patterns like: Description, Qty, Rate, Amount
            for (let i = 0; i < strings.length; i++) {
                if (strings[i].includes('$') && i > 1) {
                    const qty = parseInt(strings[i-1]) || 0;
                    const amountStr = strings[i].replace(/[$,]/g, '');
                    const amount = parseFloat(amountStr) || 0;
                    const desc = strings[i-2] ? strings[i-2].trim() : "Unknown";

                    if (qty > 0) {
                        allData.push([shopName, desc, qty, `$${amount.toFixed(2)}`]);
                        const row = `<tr><td>${shopName}</td><td>${desc}</td><td>${qty}</td><td>$${amount.toFixed(2)}</td></tr>`;
                        document.getElementById('tableBody').innerHTML += row;
                    }
                }
            }
        }
        
        document.getElementById('status').innerText = `Loaded ${allData.length} items from ${files.length} reports.`;
        document.getElementById('downloadBtn').style.display = 'block';
    });

    document.getElementById('downloadBtn').addEventListener('click', () => {
        const doc = new jsPDF();
        doc.setFontSize(18);
        doc.text("Global Depot Inventory Report", 14, 20);
        doc.setFontSize(11);
        doc.text(`Generated on: ${new Date().toLocaleDateString()}`, 14, 30);

        doc.autoTable({
            startY: 40,
            head: [['Shop Name', 'Product Description', 'Qty Out', 'Total Value']],
            body: allData,
            theme: 'grid',
            headStyles: { fillColor: [44, 62, 80] }
        });

        doc.save(`GLOBAL_DEPOT_REPORT_${new Date().getTime()}.pdf`);
    });
</script>

</body>
</html>
