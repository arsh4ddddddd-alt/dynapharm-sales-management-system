<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Depot Smart Ledger - Preloaded Products</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 20px; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        h1 { color: #1e3a8a; text-align: center; margin-bottom: 5px; }
        .subtitle { text-align: center; color: #64748b; margin-bottom: 25px; }
        .input-section { background: #f8fafc; padding: 20px; border-radius: 8px; border: 1px solid #e2e8f0; margin-bottom: 20px; }
        .grid-inputs { display: grid; grid-template-columns: 1.2fr 1fr 1.5fr 2fr 0.8fr; gap: 10px; margin-bottom: 10px; }
        input, select, datalist { padding: 10px; border: 1px solid #cbd5e1; border-radius: 4px; font-size: 14px; width: 100%; box-sizing: border-box; }
        .btn-add { background: #3b82f6; color: white; border: none; padding: 12px; border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%; grid-column: span 5; transition: 0.2s; }
        .btn-add:hover { background: #2563eb; }
        .summary-boxes { display: flex; gap: 20px; margin: 20px 0; }
        .box { flex: 1; padding: 15px; border-radius: 8px; text-align: center; color: white; font-weight: bold; }
        .box-blue { background: #1e3a8a; }
        .box-red { background: #dc2626; }
        .box-green { background: #16a34a; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #e2e8f0; padding: 12px; text-align: left; }
        th { background: #f1f5f9; color: #1e3a8a; }
        .btn-download { background: #059669; color: white; border: none; padding: 15px; width: 100%; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        .delete-btn { color: #ef4444; cursor: pointer; font-weight: bold; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h1>📦 Depot Smart Master Ledger</h1>
    <p class="subtitle">Manual Book Entry with Pre-loaded Product Codes</p>
    
    <div class="input-section">
        <div class="grid-inputs">
            <div>
                <label>Movement Date</label>
                <input type="date" id="moveDate">
            </div>
            <div>
                <label>Shop (Destination)</label>
                <input type="text" id="shopName" placeholder="e.g. UPN, KOLWEZI">
            </div>
            <div>
                <label>Product Code</label>
                <input list="codes" id="prodCode" placeholder="Search Code..." oninput="autoFill()">
                <datalist id="codes"></datalist>
            </div>
            <div>
                <label>Désignation</label>
                <input type="text" id="prodName" placeholder="Product Name" readonly style="background:#f1f5f9">
            </div>
            <div>
                <label>Unit Price ($)</label>
                <input type="number" id="price" placeholder="0.00">
            </div>
        </div>
        <div class="grid-inputs" style="grid-template-columns: 1fr 1fr 2.5fr;">
            <div>
                <label>Opening Stock (Depot)</label>
                <input type="number" id="openingStock" placeholder="Qty in Book">
            </div>
            <div>
                <label>Quantity Sent Out</label>
                <input type="number" id="qtySent" placeholder="Qty Sent">
            </div>
            <button class="btn-add" onclick="addRow()" style="margin-top:22px">ADD ENTRY TO LEDGER</button>
        </div>
    </div>

    <div class="summary-boxes">
        <div class="box box-blue">Total Inventory (In)<br><span id="sumIn">0</span></div>
        <div class="box box-red">Total Sent (Out)<br><span id="sumOut">0</span></div>
        <div class="box box-green">Stock Balance<br><span id="sumBal">0</span></div>
    </div>

    <table id="ledgerTable">
        <thead>
            <tr>
                <th>Date</th>
                <th>Destination</th>
                <th>Code</th>
                <th>Product</th>
                <th>Opening</th>
                <th>Sent Out</th>
                <th>Remaining</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <button class="btn-download" onclick="generatePDF()">GENERATE FINAL AUDIT PDF</button>
</div>

<script>
    // PRE-LOADED PRODUCTS FROM YOUR PDF
    const productDatabase = {
        "DRC1201": "CAFE GINKO EN POUDRE ET GINSENG EN POUDR",
        "DRC1202": "CAFÉ DE THE VERT AVEC POUDRE GANODERMA",
        "DRC1203": "CAFÉ KACIP FATIMA AVEC POUDRE GANODERMA",
        "DRC1204": "CAFE AVEC LA POUDRE DE TONGKAT ET MACCA",
        "DRC1205": "CAFÉ CUPPUCCINO AVEC LA POUDRE GANODERMA",
        "DRC1802A": "D.I. LIQUID ALFALFA PLUS GUARANA 500ML",
        "DRC1804": "GANODERMA CAFE (20x21g)",
        "DRC1810": "CAPUSLE DE YEE GANO 90s",
        "DRC1811": "YEEGARLIC CAPSULE 90's",
        "DRC1814": "GANODERMA CHOCOLAT (30'sX 30's)",
        "DRC1817": "CAFÉ CHOIX DU PRESIDENT 4 EN 1",
        "DRC1818": "CAFÉ NOIR GANODERMA ET TONGKATI ALI",
        "DRC2802": "COMPRIMES DE LAIT DE CHEVRE 150's",
        "DRC2804": "POUDRE INSTANTANEE DES GAINES DE SOJA",
        "DRC2805": "MARINE SOLUBLE SPIRULLINA",
        "DRC2807": "COMPRIME DE SPIRULINA (300's)",
        "DRC2812": "HERBA WARISAN MAHARANI",
        "DRC2813": "MELANGE INSTANTANE DE SOJA GINGEMBRE",
        "DRC2814": "LAIT DE CHEVRE EN 1 ET POUDRE (PREMIX)",
        "DRC3804": "DYNA TONIC 780ml",
        "DRC3809": "YEE YANG YEN TABLET 90's",
        "DRC3810": "RED COFFEE WITH GINSENG 12's x 25g",
        "DRC3812": "GREEN TEA EXTRACT CAPSULE 60's",
        "DRC3814": "PROLINK 20's x 20g",
        "DRC4803": "GINSENG MIEL ET GINGEMBRE",
        "DRC4805": "GINSENG CAPSULE 9 x 10's",
        "DRC4810": "CAFÉ TONGKAT ALI (20x21g)",
        "DRC4811": "GINALI CAPSULE 100's",
        "DRC4815": "YEEGINKGO TABLET 90's",
        "DRC4817": "MILK THISTLE TABLET 120's",
        "DRC4821": "TONGKAT ALI CAPSULE 100's",
        "DRC4824": "SEA CUCUMBER JELLY 500ml",
        "DRC5802N": "NONI 500ml",
        "DRC5803": "NONI PLUS TEA 30's x 3g",
        "DRC5806": "DYNA 'S' TABLET 120's",
        "DRC9918": "DYNA SERENOA TABLET 100's"
    };

    // Fill the datalist for search
    const dataList = document.getElementById('codes');
    for (let code in productDatabase) {
        let option = document.createElement('option');
        option.value = code;
        option.textContent = productDatabase[code];
        dataList.appendChild(option);
    }

    function autoFill() {
        const code = document.getElementById('prodCode').value;
        if (productDatabase[code]) {
            document.getElementById('prodName').value = productDatabase[code];
        } else {
            document.getElementById('prodName').value = "";
        }
    }

    let ledger = [];

    function addRow() {
        const date = document.getElementById('moveDate').value;
        const shop = document.getElementById('shopName').value;
        const code = document.getElementById('prodCode').value;
        const name = document.getElementById('prodName').value;
        const qty = parseInt(document.getElementById('qtySent').value) || 0;
        const opening = parseInt(document.getElementById('openingStock').value) || 0;
        const price = parseFloat(document.getElementById('price').value) || 0;
        
        if(!date || !shop || !code) { alert("Fill Date, Shop, and Product Code!"); return; }

        ledger.push({ date, shop, code, name, opening, qty, balance: (opening - qty), price, total: (qty * price) });
        updateUI();
        
        // Clear inputs for next item
        document.getElementById('prodCode').value = "";
        document.getElementById('prodName').value = "";
        document.getElementById('qtySent').value = "";
    }

    function deleteRow(index) {
        ledger.splice(index, 1);
        updateUI();
    }

    function updateUI() {
        const tbody = document.querySelector('#ledgerTable tbody');
        tbody.innerHTML = "";
        let totalIn = 0, totalOut = 0;

        ledger.forEach((item, index) => {
            totalIn += item.opening;
            totalOut += item.qty;
            tbody.innerHTML += `<tr>
                <td>${item.date}</td>
                <td>${item.shop}</td>
                <td>${item.code}</td>
                <td>${item.name}</td>
                <td>${item.opening}</td>
                <td style="color:red; font-weight:bold;">-${item.qty}</td>
                <td style="font-weight:bold;">${item.balance}</td>
                <td class="delete-btn" onclick="deleteRow(${index})">✖</td>
            </tr>`;
        });

        document.getElementById('sumIn').innerText = totalIn;
        document.getElementById('sumOut').innerText = totalOut;
        document.getElementById('sumBal').innerText = (totalIn - totalOut);
    }

    function generatePDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('l', 'mm', 'a4');
        doc.setFontSize(18);
        doc.text("OFFICIAL DEPOT DISTRIBUTION AUDIT", 14, 15);
        
        const data = ledger.map(i => [i.date, i.shop, i.code, i.name, i.opening, i.qty, i.balance, `$${i.total.toFixed(2)}`]);

        doc.autoTable({
            startY: 25,
            head: [['Date', 'To Shop', 'Code', 'Product', 'Opening', 'Qty Sent', 'Balance', 'Total Value']],
            body: data,
            theme: 'grid',
            headStyles: { fillColor: [30, 58, 138] }
        });

        doc.save("Official_Depot_Ledger.pdf");
    }
</script>

</body>
</html>
