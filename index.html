<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Depot Inventory Tracker</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; background: #f0f4f8; }
        .card { max-width: 1000px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #0d47a1; text-align: center; }
        #drop-area { border: 3px dashed #1976d2; padding: 40px; text-align: center; border-radius: 12px; background: #e3f2fd; cursor: pointer; }
        .btn-green { background: #2e7d32; color: white; border: none; padding: 18px; width: 100%; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; display: none; margin-top: 20px; }
        .summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; display: none; }
        .stat-card { background: #fff9c4; padding: 15px; border-radius: 8px; border-left: 5px solid #fbc02d; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 12px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background: #1976d2; color: white; }
    </style>
</head>
<body>

<div class="card">
    <h1>📦 Depot Master Inventory System</h1>
    <div id="drop-area" onclick="document.getElementById('filePicker').click()">
        <strong>Click to select Shop PDF Files</strong>
        <input type="file" id="filePicker" multiple accept="application/pdf" style="display:none">
    </div>

    <div id="summaryArea" class="summary-grid">
        <div class="stat-card">
            <strong>Total Stock Distributed:</strong>
            <div id="totalQty">0 Units</div>
        </div>
        <div class="stat-card">
            <strong>Total Inventory Value:</strong>
            <div id="totalVal">$0.00</div>
        </div>
    </div>

    <button id="downloadBtn" class="btn-green">DOWNLOAD MASTER PDF WITH STOCK COLUMNS</button>
    <div id="preview"></div>
</div>

<script>
    const { jsPDF } = window.jspdf;
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

    let allStockData = [];

    document.getElementById('filePicker').addEventListener('change', async (e) => {
        const files = e.target.files;
        allStockData = [];
        document.getElementById('preview').innerHTML = '';

        for (const file of files) {
            const arrayBuffer = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument(arrayBuffer).promise;
            const page = await pdf.getPage(1);
            const text = await page.getTextContent();
            
            // Clean the messy characters (\, ", etc.) from your files
            const lines = text.items.map(i => i.str.replace(/[\\"\r\n]/g, '').trim()).filter(s => s !== "");
            
            // The first line tells us where it WENT (Destination)
            let destination = lines[0] || "General Store";

            for (let i = 0; i < lines.length; i++) {
                if (lines[i].includes('$') && i > 1) {
                    const price = parseFloat(lines[i].replace(/[$,]/g, '')) || 0;
                    const qtyOut = parseInt(lines[i-1]) || 0;
                    const product = lines[i-2] || "Unknown Item";

                    if (qtyOut > 0) {
                        allStockData.push({
                            product: product,
                            destination: destination,
                            qtyIn: qtyOut, // Assuming what came in is what you sent out for this report
                            qtyOut: qtyOut,
                            totalValue: price
                        });
                    }
                }
            }
        }
        showPreview();
    });

    function showPreview() {
        let grandQty = 0;
        let grandVal = 0;
        let html = "<table><thead><tr><th>Product</th><th>Stock In</th><th>Sent To</th><th>Stock Out</th><th>Value</th></tr></thead><tbody>";

        allStockData.forEach(item => {
            grandQty += item.qtyOut;
            grandVal += item.totalValue;
            html += `<tr><td>${item.product}</td><td>${item.qtyIn}</td><td style="color:blue; font-weight:bold;">${item.destination}</td><td>${item.qtyOut}</td><td>$${item.totalValue.toFixed(2)}</td></tr>`;
        });

        html += "</tbody></table>";
        document.getElementById('preview').innerHTML = html;
        document.getElementById('totalQty').innerText = `${grandQty} Units`;
        document.getElementById('totalVal').innerText = `$${grandVal.toFixed(2)}`;
        document.getElementById('summaryArea').style.display = 'grid';
        document.getElementById('downloadBtn').style.display = 'block';
    }

    document.getElementById('downloadBtn').addEventListener('click', () => {
        const doc = new jsPDF('landscape'); // Landscape gives more room for columns
        doc.setFontSize(16);
        doc.text("Master Depot Stock Movement Report", 14, 15);
        
        const tableRows = allStockData.map(item => [
            item.product, 
            item.qtyIn, 
            item.destination, 
            item.qtyOut, 
            `$${item.totalValue.toFixed(2)}`
        ]);

        doc.autoTable({
            startY: 25,
            head: [['Product Description', 'Stock In', 'Sent To (Destination)', 'Stock Out', 'Total Value']],
            body: tableRows,
            theme: 'striped',
            headStyles: { fillColor: [13, 71, 161] },
            styles: { fontSize: 9 }
        });

        doc.save("Depot_Stock_Movement.pdf");
    });
</script>

</body>
</html>
