<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dynapharm Elite</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root {
            --p: #0f172a;
            --accent: #6366f1;
            --success: #10b981;
            --warn: #f43f5e;
            --orange: #f97316;
            --bg: #f8fafc;
            --glass: rgba(255, 255, 255, 0.9);
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0;
            background: var(--bg);
            padding-bottom: 110px;
            color: #1e293b;
            overflow-x: hidden;
        }

        /* --- STUNNING LOGIN --- */
        #v-auth {
            background: radial-gradient(circle at top left, #1e293b, #0f172a);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .auth-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%;
            max-width: 350px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .auth-card h1 { color: white; margin: 0 0 10px; letter-spacing: 2px; font-size: 24px; }
        .auth-card p { color: #94a3b8; font-size: 14px; margin-bottom: 30px; }

        .auth-input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            margin-bottom: 15px;
            transition: 0.3s;
        }
        .auth-input:focus { border-color: var(--accent); background: rgba(255, 255, 255, 0.1); }

        /* --- DASHBOARD UI --- */
        .header {
            background: var(--p);
            color: white;
            padding: 30px 20px 50px;
            border-radius: 0 0 40px 40px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .user-welcome { font-size: 12px; opacity: 0.7; text-transform: uppercase; letter-spacing: 1px; }
        
        .stats-row {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .stat-box {
            flex: 1;
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 20px;
            backdrop-filter: blur(5px);
        }

        .stat-box small { font-size: 10px; opacity: 0.6; display: block; }
        .stat-box b { font-size: 20px; display: block; margin-top: 4px; }

        .content { padding: 0 20px; margin-top: -30px; position: relative; z-index: 10; }

        .card {
            background: white;
            padding: 20px;
            border-radius: 24px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05);
            margin-bottom: 15px;
            border: 1px solid #f1f5f9;
            transition: transform 0.2s;
        }

        input {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #f1f5f9;
            border-radius: 16px;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
        }

        .qty-input {
            width: 80px;
            text-align: center;
            background: #f8fafc;
            border-color: #e2e8f0;
        }

        .btn {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 18px;
            font-weight: 700;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }

        .btn-p { background: var(--accent); color: white; box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3); }
        .btn-p:active { transform: scale(0.98); }

        .nav {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 400px;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(15px);
            display: flex;
            border-radius: 30px;
            padding: 10px;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.3);
        }

        .nav-btn {
            flex: 1;
            text-align: center;
            color: #64748b;
            font-size: 10px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }

        .nav-btn.active { color: white; }
        .nav-btn span { font-size: 24px; display: block; margin-bottom: 2px; }

        .low-pill {
            background: #fee2e2;
            color: var(--warn);
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 800;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="v-auth">
    <div class="auth-card">
        <h1>DYNAPHARM</h1>
        <p>Elite Inventory Management</p>
        <input id="user" class="auth-input" placeholder="Username">
        <input id="pass" type="password" class="auth-input" placeholder="Password">
        <button class="btn btn-p" onclick="handleAuth()">Enter System</button>
        <div onclick="toggleAuth()" id="t-btn" style="margin-top:20px; color:#94a3b8; cursor:pointer; font-size:12px; text-align:center">
            New here? <b>Create Account</b>
        </div>
    </div>
</div>

<div id="main-ui" class="hidden">
    <div class="header">
        <div style="display:flex; justify-content:space-between; align-items:flex-start">
            <div>
                <div class="user-welcome">Welcome back,</div>
                <b id="u-display" style="font-size: 20px;">User</b>
            </div>
            <select id="m-picker" onchange="refresh()" style="background:rgba(255,255,255,0.1); color:white; border:none; padding:8px 12px; border-radius:12px; font-weight:bold;">
                <option style="color:black">March 2026</option>
                <option style="color:black">April 2026</option>
            </select>
        </div>

        <div class="stats-row">
            <div class="stat-box">
                <small>ACTIVE STOCK</small>
                <b id="s-total">0</b>
            </div>
            <div class="stat-box">
                <small>TOP SELLER</small>
                <b id="s-top" style="font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">---</b>
            </div>
        </div>
    </div>

    <div class="content">
        <div id="v-entry">
            <div class="card" style="padding: 10px 15px;">
                <input id="search" placeholder="🔍 Search product name..." oninput="draw(this.value)" style="border:none; padding:10px 0;">
            </div>
            <div id="list"></div>
            <button class="btn btn-p" onclick="saveData()">Update Cloud Records</button>
        </div>

        <div id="v-rpt" class="hidden">
            <button class="btn" style="background:var(--orange); color:white; margin-bottom:20px;" onclick="exportPDF()">📄 Download PDF Report</button>
            <div id="rpt-list"></div>
        </div>
    </div>

    <div class="nav">
        <div class="nav-btn active" onclick="tab('OPENING', this)"><span>📦</span>OPEN</div>
        <div class="nav-btn" onclick="tab('RECEIVED', this)"><span>🚚</span>RECV</div>
        <div class="nav-btn" onclick="tab('SALES', this)"><span>💰</span>SALE</div>
        <div class="nav-btn" onclick="tab('REPORT', this)"><span>📊</span>RPT</div>
    </div>
</div>

<script>
    const _URL = "https://ywmlvtdrwijnhqdypteu.supabase.co";
    const _KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl3bWx2dGRyd2lqbmhxZHlwdGV1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI5MDM2NjIsImV4cCI6MjA4ODQ3OTY2Mn0.8-CE8qchVD8NcBX-_FDgegsjTxNMwd9IN7oNe5qeTpg";
    const sb = supabase.createClient(_URL, _KEY);

    let isLogin = true;
    let curMode = "OPENING";

    const items = [
        {c:"DRC1201", n:"GINKO & GINSENG COFFEE"}, {c:"DRC1202", n:"GANODERMA GREEN TEA"}, 
        {c:"DRC1203", n:"KACIP FATIMA GANO"}, {c:"DRC1204", n:"TONGKAT & MACCA"}, 
        {c:"DRC1814", n:"GANO CHOCO"}, {c:"DRC1818", n:"BLACK GANO"}, 
        {c:"DRC2802", n:"GOAT MILK 150s"}, {c:"DRC3804", n:"DYNA TONIC"}, 
        {c:"DRC5801", n:"CHLOROPHYLL SOAP"}, {c:"DRC5802", n:"GANO SOAP"}
    ];

    function toggleAuth() {
        isLogin = !isLogin;
        document.getElementById("t-btn").innerHTML = isLogin ? "New here? <b>Create Account</b>" : "Have account? <b>Back to Login</b>";
    }

    async function handleAuth() {
        const u = document.getElementById("user").value.trim();
        const p = document.getElementById("pass").value;
        const email = u.toLowerCase() + "@dyna.pro";
        const { error } = isLogin ? await sb.auth.signInWithPassword({email, password:p}) : await sb.auth.signUp({email, password:p});
        if(error) alert(error.message);
        else {
            document.getElementById("u-display").innerText = u.toUpperCase();
            document.getElementById("v-auth").classList.add("hidden");
            document.getElementById("main-ui").classList.remove("hidden");
            refresh();
        }
    }

    function tab(m, el) {
        curMode = m;
        document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"));
        el.classList.add("active");
        document.getElementById("v-entry").classList.toggle("hidden", m === "REPORT");
        document.getElementById("v-rpt").classList.toggle("hidden", m !== "REPORT");
        if(m === "REPORT") loadReport(); else draw();
    }

    function refresh() { draw(); loadReport(); }

    function draw(f = "") {
        document.getElementById("list").innerHTML = items
            .filter(i => i.n.includes(f.toUpperCase()) || i.c.includes(f.toUpperCase()))
            .map(i => `
                <div class="card" style="display:flex; justify-content:space-between; align-items:center;">
                    <div><b>${i.n}</b><br><small style="color:#64748b">${i.c}</small></div>
                    <input type="number" class="qty-input" data-c="${i.c}" placeholder="0">
                </div>
            `).join("");
    }

    async function saveData() {
        const { data: { user } } = await sb.auth.getUser();
        const month = document.getElementById("m-picker").value;
        const rows = [...document.querySelectorAll(".qty-input")]
            .map(x => ({ code: x.dataset.c, qty: parseInt(x.value) || 0 }))
            .filter(x => x.qty > 0);

        if(!rows.length) return alert("Enter quantities first!");

        let err;
        if(curMode === "OPENING") ({ error: err } = await sb.from("monthly_stock").upsert(rows.map(r => ({ product_code: r.code, opening_quantity: r.qty, month_year: month, user_id: user.id })), { onConflict: 'month_year,product_code,user_id' }));
        if(curMode === "SALES") ({ error: err } = await sb.from("sales").insert(rows.map(r => ({ product_code: r.code, qty_sold: r.qty, month_ref: month, user_id: user.id }))));
        if(curMode === "RECEIVED") ({ error: err } = await sb.from("received_stock").insert(rows.map(r => ({ product_code: r.code, qty_received: r.qty, month_ref: month, user_id: user.id }))));

        if(err) alert(err.message); else { alert("Sync Complete!"); draw(); loadReport(); }
    }

    async function loadReport() {
        const month = document.getElementById("m-picker").value;
        const { data: o } = await sb.from("monthly_stock").select("*").eq('month_year', month);
        const { data: s } = await sb.from("sales").select("*").eq('month_ref', month);
        const { data: r } = await sb.from("received_stock").select("*").eq('month_ref', month);

        const report = items.map(i => {
            const open = o?.find(x => x.product_code === i.c)?.opening_quantity || 0;
            const sold = s?.filter(x => x.product_code === i.c).reduce((a, b) => a + b.qty_sold, 0) || 0;
            const recv = r?.filter(x => x.product_code === i.c).reduce((a, b) => a + b.qty_received, 0) || 0;
            const stock = open + recv - sold;
            return { name: i.n, open, recv, sold, stock };
        }).filter(x => x.open || x.recv || x.sold);

        document.getElementById("s-total").innerText = report.length;
        const top = [...report].sort((a,b) => b.sold - a.sold)[0];
        document.getElementById("s-top").innerText = top ? top.name : "---";

        document.getElementById("rpt-list").innerHTML = report.map(d => `
            <div class="card">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <b>${d.name}</b>
                    <span class="${d.stock < 5 ? 'low-pill' : ''}" style="font-weight:900;">${d.stock}</span>
                </div>
                <div style="margin-top:12px; font-size:11px; color:#64748b; display:flex; justify-content:space-between; border-top:1px solid #f1f5f9; padding-top:10px;">
                    <span>OPEN: ${d.open}</span><span>RECV: ${d.recv}</span><span>SOLD: ${d.sold}</span>
                </div>
            </div>
        `).join("");
        window.rptData = report;
    }

    function exportPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const month = document.getElementById("m-picker").value;
        
        doc.setFillColor(244, 63, 94); // Red Header
        doc.rect(0, 0, 210, 40, 'F');
        doc.setTextColor(255, 255, 255);
        doc.setFontSize(22);
        doc.text("DYNAPHARM OFFICIAL REPORT", 14, 25);
        
        doc.autoTable({
            startY: 45,
            head: [['PRODUCT', 'OPEN', 'RECV', 'SOLD', 'BALANCE']],
            body: window.rptData.map(x => [x.name, x.open, x.recv, x.sold, x.stock]),
            headStyles: { fillColor: [249, 115, 22] }, // Orange Table Head
            theme: 'grid'
        });
        doc.save(`Dynapharm_${month}.pdf`);
    }
</script>
</body>
</html>
