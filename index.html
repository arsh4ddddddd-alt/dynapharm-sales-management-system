<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Depot Master Stock Ledger</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; background: #f4f7f9; color: #333; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); }
        h1 { color: #1a237e; text-align: center; margin-bottom: 5px; }
        .info { text-align: center; color: #666; margin-bottom: 25px; font-size: 14px; }
        #drop-zone { border: 3px dashed #3949ab; padding: 50px; text-align: center; border-radius: 10px; background: #f5f6ff; cursor: pointer; transition: 0.2s; }
        #drop-zone:hover { background: #e8eaf6; border-color: #1a237e; }
        .btn-generate { background: #1b5e20; color: white; border: none; padding: 20px; width: 100%; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; display: none; margin-top: 25px; transition: 0.3s; }
        .btn-generate:hover { background: #2e7d32; }
        #status { margin: 15px 0; padding: 10px; border-radius: 4px; display: none; text-align: center; font-weight: bold; }
        .preview-table { width: 100%; border-collapse: collapse; margin-top: 30px; font-size: 12px; }
        .preview-table th, .preview-table td { border: 1px solid #e0e0e0; padding: 12px; text-align: left; }
        .preview-table th { background: #1a237e; color: white; }
        .preview-table tr:nth-child(even) { background: #f9f9f9; }
    </style>
</head>
<body>

<div class="container">
    <h1>📦 Depot Master Inventory Ledger</h1>
    <p class="info">Complete history of every item: When it moved, Where it went, and How much.</p>

    <div id="drop-zone" onclick="document.getElementById('fileInput').click()">
        <strong>Click to Upload ALL PDF Files</strong>
        <p>The system will automatically extract dates and destinations from every page.</p>
        <input type="file" id="fileInput" multiple accept="application/pdf" style="display:none">
    </div>

    <div id="status"></div>

    <button id="generateBtn" class="btn-generate">GENERATE FINAL LOGICAL REPORT (PDF)</button>

    <div id="previewArea"></div>
</div>

<script>
    const { jsPDF } = window.jspdf;
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

    let masterRecord = [];

    document.getElementById('fileInput').addEventListener('change', async (e) => {
        const files = e.target.files;
        if (!files.length) return;

        masterRecord = [];
        const status = document.getElementById('status');
        status.style.display = 'block';
        status.style.background = '#fff3e0';
        status.innerText = "Analyzing all files... please wait.";

        for (const file of files) {
            const arrayBuffer = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument(arrayBuffer).promise;

            // Scan every single page of the document
            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const textContent = await page.getTextContent();
                
                // Clean and extract strings
                const items = textContent.items.map(item => 
                    item.str.replace(/[\\"\r\n]/g, '').trim()
                ).filter(s => s !== "");

                // Logic to identify Date and Shop for THIS specific page
                let pageShop = "Unknown Shop";
                let pageDate = "Unknown Date";

                // Check first 15 strings for header info
                for (let j = 0; j < Math.min(15, items.length); j++) {
                    if (items[j].toUpperCase().includes("DEPOT TO")) {
                        pageShop = items[j];
                    }
                    // Simple Regex for Date detection (e.g., October 7 2025)
                    if (/(JANUARY|FEBRUARY|MARCH|APRIL|MAY|JUNE|JULY|AUGUST|SEPTEMBER|OCTOBER|NOVEMBER|DECEMBER)\s+\d{1,2}\s+\d{4}/i.test(items[j])) {
                        pageDate = items[j];
                    }
                }

                // Scan for Product Lines
                for (let k = 0; k < items.length; k++) {
                    // We look for the Price/Amount ($) as the anchor for a valid row
                    if (items[k].includes('$') && k > 1) {
                        const amount = parseFloat(items[k].replace(/[$,]/g, '')) || 0;
                        const qty = parseInt(items[k-1]) || 0;
                        const product = items[k-2] || "Unknown Product";

                        // Logic: Only record if stock actually moved (Qty > 0)
                        if (qty > 0) {
                            masterRecord.push({
                                date: pageDate,
                                shop: pageShop,
                                description: product,
                                qtyIn: qty,
                                qtyOut: qty,
                                value: amount
                            });
                        }
                    }
                }
            }
        }

        renderPreview();
    });

    function renderPreview() {
        const status = document.getElementById('status');
        const generateBtn = document.getElementById('generateBtn');
        
        if (masterRecord.length === 0) {
            status.style.background = '#ffebee';
            status.innerText = "Error: No stock movements found. Please check your PDF format.";
            return;
        }

        // Logical Sort: Sort by Date first, then by Shop
        masterRecord.sort((a, b) => new Date(a.date) - new Date(b.date) || a.shop.localeCompare(b.shop));

        status.style.background = '#e8f5e9';
        status.innerText = `Found ${masterRecord.length} stock movements across all dates.`;
        generateBtn.style.display = 'block';

        let html = `<table class="preview-table"><thead><tr><th>Movement Date</th><th>Destination (Shop)</th><th>Item</th><th>Qty</th><th>Total Value</th></tr></thead><tbody>`;
        
        masterRecord.forEach(row => {
            html += `<tr>
                <td>${row.date}</td>
                <td style="font-weight:bold; color:#1a237e;">${row.shop}</td>
                <td>${row.description}</td>
                <td>${row.qtyOut}</td>
                <td>$${row.value.toFixed(2)}</td>
            </tr>`;
        });
        
        html += `</tbody></table>`;
        document.getElementById('previewArea').innerHTML = html;
    }

    document.getElementById('generateBtn').addEventListener('click', () => {
        const doc = new jsPDF('l', 'mm', 'a4');
        
        doc.setFontSize(20);
        doc.setTextColor(26, 35, 126);
        doc.text("DEPOT MASTER STOCK MOVEMENT LEDGER", 14, 15);
        
        doc.setFontSize(10);
        doc.setTextColor(100);
        doc.text(`Generated on: ${new Date().toLocaleString()}`, 14, 22);

        const tableData = masterRecord.map(r => [
            r.date,
            r.shop,
            r.description,
            r.qtyIn,
            r.qtyOut,
            `$${r.value.toFixed(2)}`
        ]);

        doc.autoTable({
            startY: 30,
            head: [['Date', 'To (Destination Shop)', 'Product Description', 'Stock In', 'Stock Out', 'Total Value']],
            body: tableData,
            theme: 'grid',
            headStyles: { fillColor: [26, 35, 126], fontSize: 10 },
            styles: { fontSize: 8, cellPadding: 3 },
            columnStyles: {
                0: { cellWidth: 35 },
                1: { cellWidth: 50, fontStyle: 'bold' },
                2: { cellWidth: 'auto' }
            }
        });

        doc.save(`Depot_Full_Ledger_${new Date().toISOString().split('T')[0]}.pdf`);
    });
</script>

</body>
</html>
