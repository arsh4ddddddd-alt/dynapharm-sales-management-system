<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Depot Stock Manager</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; color: #333; padding: 20px; }
        .app-container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        #drop-area { border: 2px dashed #3498db; padding: 40px; text-align: center; border-radius: 8px; background: #f9fbfd; cursor: pointer; margin-bottom: 20px; }
        .summary-bar { display: flex; justify-content: space-around; background: #ecf0f1; padding: 20px; border-radius: 8px; margin-bottom: 20px; font-weight: bold; }
        .btn-download { background: #27ae60; color: white; border: none; padding: 15px; width: 100%; border-radius: 6px; font-size: 18px; cursor: pointer; display: none; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; font-size: 14px; }
        th { background: #3498db; color: white; }
    </style>
</head>
<body>

<div class="app-container">
    <h1>📦 Simple Depot Stock Tracker</h1>
    
    <div id="drop-area" onclick="document.getElementById('fileInput').click()">
        <strong>Click here to upload all Shop PDFs</strong>
        <p>(Masina, UPN, etc.)</p>
        <input type="file" id="fileInput" multiple accept="application/pdf" style="display:none">
    </div>

    <div id="summary" class="summary-bar" style="display:none">
        <div>Total Stock In: <span id="totalIn" style="color:#2980b9">0</span></div>
        <div>Total Stock Out: <span id="totalOut" style="color:#27ae60">0</span></div>
    </div>

    <button id="downloadBtn" class="btn-download">Download Simple Report</button>

    <div id="previewArea"></div>
</div>

<script>
    const { jsPDF } = window.jspdf;
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

    let ledgerData = [];

    document.getElementById('fileInput').addEventListener('change', async (e) => {
        const files = e.target.files;
        ledgerData = [];
        
        for (const file of files) {
            const arrayBuffer = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument(arrayBuffer).promise;

            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const text = await page.getTextContent();
                const lines = text.items.map(item => item.str.replace(/[\\"\r\n]/g, '').trim()).filter(s => s !== "");

                // Simple Extraction
                let shop = "Unknown";
                let date = "Unknown";
                
                // Look for "DEPOT TO [SHOP] [DATE]"
                for (let line of lines) {
                    if (line.toUpperCase().includes("DEPOT TO")) {
                        const parts = line.toUpperCase().split("DEPOT TO")[1].trim().split(" ");
                        shop = parts[0];
                        date = parts.slice(1).join(" ");
                        break;
                    }
                }

                for (let k = 0; k < lines.length; k++) {
                    if (lines[k].includes('$') && k > 1) {
                        const qty = parseInt(lines[k-1]) || 0;
                        const product = lines[k-2];

                        if (qty > 0) {
                            ledgerData.push({ date, shop, product, qty });
                        }
                    }
                }
            }
        }
        updateUI();
    });

    function updateUI() {
        let total = ledgerData.reduce((sum, item) => sum + item.qty, 0);
        document.getElementById('totalIn').innerText = total;
        document.getElementById('totalOut').innerText = total;
        document.getElementById('summary').style.display = 'flex';
        document.getElementById('downloadBtn').style.display = 'block';

        let html = "<table><thead><tr><th>Date</th><th>Shop Name</th><th>Product</th><th>Qty Sent</th></tr></thead><tbody>";
        ledgerData.forEach(item => {
            html += `<tr><td>${item.date}</td><td>${item.shop}</td><td>${item.product}</td><td>${item.qty}</td></tr>`;
        });
        html += "</tbody></table>";
        document.getElementById('previewArea').innerHTML = html;
    }

    document.getElementById('downloadBtn').addEventListener('click', () => {
        const doc = new jsPDF();
        doc.setFontSize(18);
        doc.text("Depot Stock Distribution Report", 14, 20);
        
        const rows = ledgerData.map(item => [item.date, item.shop, item.product, item.qty]);
        
        doc.autoTable({
            startY: 30,
            head: [['Date', 'To Shop', 'Product', 'Qty Out']],
            body: rows,
            theme: 'striped'
        });

        doc.save("Simple_Depot_Report.pdf");
    });
</script>

</body>
</html>
