<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Depot Master Inventory Reporter</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 30px; background: #f4f7f9; color: #333; }
        .container { max-width: 950px; margin: auto; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.05); }
        h1 { color: #1e3a8a; text-align: center; margin-bottom: 30px; }
        #drop-zone { border: 3px dashed #3b82f6; padding: 50px; text-align: center; border-radius: 15px; cursor: pointer; background: #eff6ff; transition: 0.3s; }
        #drop-zone:hover { background: #dbeafe; border-color: #2563eb; }
        .btn-generate { background: #10b981; color: white; border: none; padding: 18px; width: 100%; border-radius: 8px; font-size: 20px; font-weight: bold; cursor: pointer; display: none; margin-top: 20px; }
        .btn-generate:hover { background: #059669; }
        .status-msg { text-align: center; margin: 15px 0; font-weight: 600; color: #64748b; }
        table { width: 100%; border-collapse: collapse; margin-top: 25px; }
        th, td { border: 1px solid #e2e8f0; padding: 12px; text-align: left; }
        th { background: #f8fafc; color: #1e293b; }
        .shop-header { background: #1e3a8a; color: white; padding: 8px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>📦 Global Depot Distribution Hub</h1>
    <div id="drop-zone" onclick="document.getElementById('fileInput').click()">
        <p style="font-size: 18px; margin: 0;"><strong>Drop your PDFs here</strong> or click to browse</p>
        <p style="color: #64748b; font-size: 14px;">(Select Masina, UPN, and all other shop reports together)</p>
        <input type="file" id="fileInput" multiple accept="application/pdf" style="display:none">
    </div>

    <div id="status" class="status-msg">No files selected</div>
    <button id="btnGenerate" class="btn-generate">GENERATE MASTER PDF REPORT</button>

    <div id="previewArea"></div>
</div>

<script>
    const { jsPDF } = window.jspdf;
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

    let shopGroups = {}; // Stores data separated by shop

    document.getElementById('fileInput').addEventListener('change', async (e) => {
        const files = e.target.files;
        if (files.length === 0) return;
        
        shopGroups = {}; 
        document.getElementById('status').innerText = "Reading reports... please wait.";
        document.getElementById('previewArea').innerHTML = '';

        for (const file of files) {
            const arrayBuffer = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument(arrayBuffer).promise;
            const page = await pdf.getPage(1);
            const content = await page.getTextContent();
            
            // Clean text: removes quotes and weird characters found in your files
            const rawData = content.items.map(i => i.str.replace(/[\\"\r\n]/g, '').trim());
            
            // Determine Shop Name (Usually first line of PDF)
            let shopName = rawData[0] || "Unknown Shop";
            if (!shopGroups[shopName]) shopGroups[shopName] = [];

            // Parse rows: Looking for Qty and Amount next to each other
            for (let i = 0; i < rawData.length; i++) {
                if (rawData[i].includes('$') && i > 1) {
                    const amountStr = rawData[i].replace(/[$,]/g, '');
                    const amount = parseFloat(amountStr) || 0;
                    const qty = parseInt(rawData[i-1]) || 0;
                    const desc = rawData[i-2] || "Unknown Product";

                    if (qty > 0) {
                        shopGroups[shopName].push({ desc, qty, amount });
                    }
                }
            }
        }

        renderPreview();
        document.getElementById('status').innerText = "Reports loaded successfully!";
        document.getElementById('btnGenerate').style.display = 'block';
    });

    function renderPreview() {
        let html = "";
        for (const shop in shopGroups) {
            html += `<table><thead><tr><th colspan="3" class="shop-header">${shop}</th></tr>`;
            html += `<tr><th>Product</th><th>Qty</th><th>Amount</th></tr></thead><tbody>`;
            shopGroups[shop].forEach(item => {
                html += `<tr><td>${item.desc}</td><td>${item.qty}</td><td>$${item.amount.toFixed(2)}</td></tr>`;
            });
            html += `</tbody></table>`;
        }
        document.getElementById('previewArea').innerHTML = html;
    }

    document.getElementById('btnGenerate').addEventListener('click', () => {
        const doc = new jsPDF();
        let yPos = 20;
        let grandTotalAmount = 0;
        let grandTotalQty = 0;

        doc.setFontSize(20);
        doc.setTextColor(30, 58, 138);
        doc.text("MASTER DEPOT DISTRIBUTION REPORT", 14, yPos);
        
        yPos += 10;
        doc.setFontSize(10);
        doc.setTextColor(100);
        doc.text(`Report Date: ${new Date().toLocaleString()}`, 14, yPos);
        yPos += 10;

        for (const shop in shopGroups) {
            if (yPos > 250) { doc.addPage(); yPos = 20; }

            const tableData = shopGroups[shop].map(item => {
                grandTotalAmount += item.amount;
                grandTotalQty += item.qty;
                return [item.desc, item.qty, `$${item.amount.toFixed(2)}` text];
            });

            doc.autoTable({
                startY: yPos,
                head: [[{ content: shop, colSpan: 3, styles: { halign: 'center', fillColor: [30, 58, 138] } }], ['Product Description', 'Qty Out', 'Total Value']],
                body: tableData,
                theme: 'grid',
                styles: { fontSize: 8 },
                margin: { top: 20 }
            });
            yPos = doc.lastAutoTable.finalY + 15;
        }

        // Summary Calculations at the bottom
        if (yPos > 230) { doc.addPage(); yPos = 20; }
        doc.setFontSize(14);
        doc.setTextColor(0);
        doc.text("GRAND TOTAL SUMMARY (ALL SHOPS)", 14, yPos + 10);
        doc.setFontSize(12);
        doc.text(`Total Stock Units Sent: ${grandTotalQty}`, 14, yPos + 20);
        doc.text(`Total Combined Business Value: $${grandTotalAmount.toFixed(2)}`, 14, yPos + 30);

        doc.save(`Depot_Master_Report_${new Date().getTime()}.pdf`);
    });
</script>

</body>
</html>
