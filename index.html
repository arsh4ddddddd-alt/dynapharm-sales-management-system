<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InstaCheck Max</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #fafafa; padding: 20px; display: flex; justify-content: center; }
        .card { background: white; border: 1px solid #dbdbdb; border-radius: 12px; padding: 25px; width: 100%; max-width: 400px; text-align: center; }
        .upload-area { border: 2px dashed #0095f6; padding: 30px; border-radius: 10px; margin-bottom: 20px; background: #f0f9ff; }
        button { width: 100%; padding: 14px; background: #0095f6; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        #results { margin-top: 25px; text-align: left; display: none; }
        .user-row { padding: 12px; border-bottom: 1px solid #efefef; }
        .user-row a { text-decoration: none; color: #00376b; font-weight: 600; }
        .status { font-size: 13px; color: #8e8e8e; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h2>Unfollower Finder</h2>
    <p id="status" class="status">Upload your Instagram .zip file</p>
    
    <div class="upload-area">
        <input type="file" id="zipFile" accept=".zip">
    </div>

    <button onclick="processZip()">Analyze Everything</button>

    <div id="results">
        <h3 id="countHeader">Results:</h3>
        <div id="resultList"></div>
    </div>
</div>

<script>
    function extractNames(obj, set) {
        if (!obj) return;
        if (typeof obj === 'object') {
            if (obj.value && typeof obj.value === 'string') set.add(obj.value);
            for (let key in obj) extractNames(obj[key], set);
        }
    }

    async function processZip() {
        const fileInput = document.getElementById('zipFile');
        const status = document.getElementById('status');
        if (!fileInput.files.length) return alert("Select a file!");

        try {
            status.innerText = "Scanning all files inside ZIP...";
            const zip = await JSZip.loadAsync(fileInput.files[0]);
            
            let followers = new Set();
            let following = new Set();

            // Loop through EVERY file in the ZIP
            for (let filename in zip.files) {
                if (filename.endsWith('.json')) {
                    const content = JSON.parse(await zip.file(filename).async("string"));
                    
                    if (filename.includes("following.json")) {
                        extractNames(content, following);
                    } else if (filename.includes("followers")) {
                        extractNames(content, followers);
                    }
                }
            }

            const listDiv = document.getElementById('resultList');
            listDiv.innerHTML = '';
            let count = 0;

            following.forEach(user => {
                if (!followers.has(user)) {
                    const div = document.createElement('div');
                    div.className = 'user-row';
                    div.innerHTML = `<a href="https://instagram.com/${user}" target="_blank">@${user}</a>`;
                    listDiv.appendChild(div);
                    count++;
                }
            });

            document.getElementById('countHeader').innerText = `${count} non-followers found:`;
            document.getElementById('results').style.display = 'block';
            status.innerText = `Scan complete. Found ${following.size} Following and ${followers.size} Followers.`;

        } catch (err) {
            alert("Error: " + err.message);
            status.innerText = "Failed.";
        }
    }
</script>

</body>
</html>
