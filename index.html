<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Depot Master Reporter</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f0f2f5; }
        .box { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { color: #1a73e8; text-align: center; }
        #drop-zone { border: 3px dashed #1a73e8; padding: 40px; text-align: center; border-radius: 10px; cursor: pointer; background: #f8fbff; margin-bottom: 20px; }
        .btn { background: #28a745; color: white; border: none; padding: 15px; width: 100%; border-radius: 5px; font-size: 18px; cursor: pointer; display: none; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background: #f1f3f4; }
    </style>
</head>
<body>

<div class="box">
    <h1>📦 Depot Inventory Hub</h1>
    <div id="drop-zone" onclick="document.getElementById('files').click()">
        <strong>Click to select all your Shop PDFs (Masina, UPN, etc.)</strong>
        <input type="file" id="files" multiple accept="application/pdf" style="display:none">
    </div>

    <button id="btnExport" class="btn">Generate Master PDF Report</button>

    <table id="preview">
        <thead>
            <tr>
                <th>Shop</th>
                <th>Product</th>
                <th>Qty Out</th>
                <th>Amount</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<script>
    const { jsPDF } = window.jspdf;
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

    let masterData = [];

    document.getElementById('files').addEventListener('change', async (e) => {
        const files = e.target.files;
        masterData = [];
        document.querySelector('tbody').innerHTML = '';

        for (const file of files) {
            const arrayBuffer = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument(arrayBuffer).promise;
            const page = await pdf.getPage(1);
            const text = await page.getTextContent();
            
            // Step 1: Clean the text (remove quotes and extra lines)
            const rawItems = text.items.map(i => i.str.replace(/"/g, '').trim());
            const shopName = rawItems[0] || file.name;

            // Step 2: Loop through data to find products with a Quantity and Amount
            for (let i = 0; i < rawItems.length; i++) {
                // If we find a $ sign, we look back for the Qty and Description
                if (rawItems[i].includes('$') && i > 1) {
                    const amount = rawItems[i];
                    const qty = parseInt(rawItems[i-1]);
                    const desc = rawItems[i-2];

                    if (!isNaN(qty) && qty > 0) {
                        masterData.push([shopName, desc, qty, amount]);
                        const row = `<tr><td>${shopName}</td><td>${desc}</td><td>${qty}</td><td>${amount}</td></tr>`;
                        document.querySelector('tbody').innerHTML += row;
                    }
                }
            }
        }
        if (masterData.length > 0) document.getElementById('btnExport').style.display = 'block';
    });

    document.getElementById('btnExport').addEventListener('click', () => {
        const doc = new jsPDF();
        doc.setFontSize(18);
        doc.text("Master Depot Distribution Report", 14, 20);
        doc.setFontSize(10);
        doc.text(`Created on: ${new Date().toLocaleString()}`, 14, 28);

        doc.autoTable({
            startY: 35,
            head: [['Shop Name', 'Description', 'Qty Out', 'Total Value']],
            body: masterData,
            theme: 'grid',
            styles: { fontSize: 8 },
            headStyles: { fillColor: [26, 115, 232] }
        });

        doc.save("GLOBAL_REPORT.pdf");
    });
</script>

</body>
</html>
