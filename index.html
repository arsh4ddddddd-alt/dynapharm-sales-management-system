<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Depot Inventory & Distribution System</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #f8fafc; padding: 20px; }
        .container { max-width: 1100px; margin: auto; background: #1e293b; padding: 30px; border-radius: 15px; border: 1px solid #334155; }
        h1 { text-align: center; color: #38bdf8; margin-bottom: 5px; }
        .subtitle { text-align: center; color: #94a3b8; margin-bottom: 25px; font-size: 14px; }
        #drop-zone { border: 2px dashed #38bdf8; padding: 40px; text-align: center; border-radius: 12px; background: rgba(56, 189, 248, 0.05); cursor: pointer; }
        .btn-main { background: #10b981; color: white; border: none; padding: 18px; width: 100%; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; display: none; margin-top: 20px; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin: 20px 0; display: none; }
        .stat-card { background: #0f172a; padding: 15px; border-radius: 8px; border-top: 4px solid #38bdf8; text-align: center; }
        .stat-val { font-size: 24px; font-weight: bold; color: #38bdf8; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: #1e293b; color: white; font-size: 12px; }
        th, td { border: 1px solid #334155; padding: 10px; text-align: left; }
        th { background: #0f172a; color: #38bdf8; }
        .dest-tag { color: #fbbf24; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>📦 Depot Inventory Master</h1>
    <p class="subtitle">Calculates Total Stock In, Out, and Tracking Destinations</p>

    <div id="drop-zone" onclick="document.getElementById('fileInput').click()">
        <strong>UPLOAD ALL SHOP FILES (PDF)</strong>
        <p>The system will scan all pages for movement data</p>
        <input type="file" id="fileInput" multiple accept="application/pdf" style="display:none">
    </div>

    <div id="stats" class="stats-grid">
        <div class="stat-card"><div>Total Items Processed</div><div id="statTotalQty" class="stat-val">0</div></div>
        <div class="stat-card"><div>Total Stock Value</div><div id="statTotalVal" class="stat-val">$0.00</div></div>
        <div class="stat-card"><div>Active Destinations</div><div id="statShops" class="stat-val">0</div></div>
    </div>

    <button id="exportBtn" class="btn-main">GENERATE FULL INVENTORY REPORT</button>
    
    <div id="previewArea"></div>
</div>

<script>
    const { jsPDF } = window.jspdf;
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

    let inventoryLedger = [];

    document.getElementById('fileInput').addEventListener('change', async (e) => {
        const files = e.target.files;
        if (!files.length) return;

        inventoryLedger = [];
        for (const file of files) {
            const arrayBuffer = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument(arrayBuffer).promise;

            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const text = await page.getTextContent();
                const lines = text.items.map(item => item.str.replace(/[\\"\r\n]/g, '').trim()).filter(s => s !== "");

                // Smart Logic: Identify Shop and Date
                let shopName = "DEPOT STORAGE";
                let movementDate = "NO DATE";
                
                for (let j = 0; j < Math.min(10, lines.length); j++) {
                    if (lines[j].toUpperCase().includes("DEPOT TO")) {
                        const parts = lines[j].toUpperCase().split("DEPOT TO")[1].trim().split(" ");
                        shopName = parts[0]; 
                        movementDate = parts.slice(1).join(" ");
                    }
                }

                // Scan for Product Lines
                for (let k = 0; k < lines.length; k++) {
                    if (lines[k].includes('$') && k > 1) {
                        const val = parseFloat(lines[k].replace(/[$,]/g, '')) || 0;
                        const qty = parseInt(lines[k-1]) || 0;
                        const product = lines[k-2] || "Unknown";

                        if (qty > 0) {
                            inventoryLedger.push({ date: movementDate, shop: shopName, item: product, qty: qty, value: val });
                        }
                    }
                }
            }
        }
        renderDashboard();
    });

    function renderDashboard() {
        let totalQty = 0;
        let totalVal = 0;
        let shops = new Set();

        let html = "<table><thead><tr><th>Date</th><th>Product</th><th>Destination</th><th>Stock In (Depot)</th><th>Stock Out (Shop)</th><th>Value</th></tr></thead><tbody>";
        
        inventoryLedger.forEach(r => {
            totalQty += r.qty;
            totalVal += r.value;
            shops.add(r.shop);
            html += `<tr><td>${r.date}</td><td>${r.item}</td><td class="dest-tag">${r.shop}</td><td>${r.qty}</td><td>${r.qty}</td><td>$${r.value.toFixed(2)}</td></tr>`;
        });

        html += "</tbody></table>";
        document.getElementById('previewArea').innerHTML = html;
        document.getElementById('statTotalQty').innerText = totalQty;
        document.getElementById('statTotalVal').innerText = `$${totalVal.toFixed(2)}`;
        document.getElementById('statShops').innerText = shops.size;
        
        document.getElementById('stats').style.display = 'grid';
        document.getElementById('exportBtn').style.display = 'block';
    }

    document.getElementById('exportBtn').addEventListener('click', () => {
        const doc = new jsPDF('l', 'mm', 'a4');
        doc.setFontSize(18);
        doc.setTextColor(56, 189, 248);
        doc.text("GLOBAL DEPOT STOCK MOVEMENT REPORT", 14, 15);
        
        doc.setFontSize(10);
        doc.setTextColor(100);
        doc.text(`Total Stock Distributed: ${document.getElementById('statTotalQty').innerText} Units`, 14, 22);

        const rows = inventoryLedger.map(r => [r.date, r.item, r.shop, r.qty, r.qty, `$${r.value.toFixed(2)}`]);

        doc.autoTable({
            startY: 28,
            head: [['Date', 'Product Name', 'Sent To (Destination)', 'Stock In', 'Stock Out', 'Total Value']],
            body: rows,
            theme: 'grid',
            headStyles: { fillColor: [15, 23, 42] },
            columnStyles: { 2: { fontStyle: 'bold' } }
        });

        doc.save("Depot_Full_Inventory_Report.pdf");
    });
</script>

</body>
</html>
